        ${m.id===imprevisibleId ? `<div style="display:flex;align-items:center;gap:5px;padding:5px 10px;margin-bottom:4px;background:rgba(251,191,36,.08);border:.5px solid rgba(251,191,36,.3);border-radius:6px;font-size:11px;color:var(--gold);font-weight:600;">🎲 Partido Imprevisible · Las apuestas están muy divididas</div>` : ''}
        <div class="match-body">
          <div class="team-side">
            <div class="team-flag">${renderFlag(m.homeCode, m.homeTeam)}</div>
            <div class="team-name">${m.homeTeam}</div>
          </div>
          <div class="score-area" ${isLiveMatch?'style="flex-direction:column;align-items:center;gap:3px;"':''}>
            <div style="display:flex;align-items:center;gap:6px;">
              <input type="number" class="score-box" id="h-${m.id}" min="0" max="20" placeholder="–"
                value="${pred!=null?pred.homeScore:''}" ${closed?'disabled':''}
                ${!closed&&PLAYOFF_PHASES.has(m.phase)?`oninput="checkPenSelector('${m.id}')"`:''}>
              <span class="score-sep">:</span>
              <input type="number" class="score-box" id="a-${m.id}" min="0" max="20" placeholder="–"
                value="${pred!=null?pred.awayScore:''}" ${closed?'disabled':''}
                ${!closed&&PLAYOFF_PHASES.has(m.phase)?`oninput="checkPenSelector('${m.id}')"`:''}>
            </div>
            ${isLiveMatch?`<div style="font-size:11px;font-weight:700;color:#f97316;letter-spacing:.03em;">${liveTimeStr}</div>`:''}
            ${isLiveMatch&&m.homeScore!==null?`<div style="font-size:15px;font-weight:800;color:#f97316;font-family:var(--fd);letter-spacing:.05em;">${m.homeScore}–${m.awayScore}</div>`:''}
          </div>
          <div class="team-side">
            <div class="team-flag">${renderFlag(m.awayCode, m.awayTeam)}</div>
            <div class="team-name">${m.awayTeam}</div>
          </div>
        </div>
        ${(() => {
          if (!PLAYOFF_PHASES.has(m.phase)) return '';
          if (closed) {
            if (!pred?.penWinner) return '';
            const penName = pred.penWinner===m.homeCode ? m.homeTeam : pred.penWinner===m.awayCode ? m.awayTeam : pred.penWinner;
            return `<div style="margin-top:8px;font-size:11px;color:var(--text-m);padding:6px 10px;background:var(--bg-el);border-radius:var(--radius-s);">⚽ Penales: <strong style="color:var(--text);">${penName}</strong></div>`;
          }
          const initDraw = pred && pred.homeScore===pred.awayScore;
          const hActive  = pred?.penWinner===m.homeCode;
          const aActive  = pred?.penWinner===m.awayCode;
          return `<div class="pen-selector" id="pen-row-${m.id}" style="display:${initDraw?'block':'none'};">
            <div class="pen-label">⚽ ¿Quién gana en penales?</div>
            <div class="pen-btns">
              <button class="pen-btn${hActive?' active':''}" id="pen-h-${m.id}" onclick="setPenWinner('${m.id}',true)">${m.homeTeam}</button>
              <button class="pen-btn${aActive?' active':''}" id="pen-a-${m.id}" onclick="setPenWinner('${m.id}',false)">${m.awayTeam}</button>
            </div>
          </div>`;
        })()}
        <div class="match-footer">
          ${closed
            ? `<span class="closed-lbl">🔒 ${m.status==='finished'?'Finalizado':'Cerrado'}</span>`
            : quota > 0
              ? `<button class="wc-btn ${isWC?'active':''}" id="wc-${m.id}"
                  onclick="toggleWC('${m.id}')" ${!canWC?'disabled':''}
                  title="${isWC?'Quitar redoblona':rem>0?'Usar redoblona (×2 pts)':'Ya usaste tu redoblona en este grupo/fase'}">
                  🎯 ${isWC?'Redoblona ×2':'Redoblona'}
                </button>`
              : ''}
          <div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap;">
            ${closed&&m.status!=='live'
              ? `<span class="pill pill-info">${pred!=null?pred.homeScore+'-'+pred.awayScore:'Sin pronóstico'}</span>`
              : !closed&&pred!=null
                ? `<button class="btn-save editing" id="sv-${m.id}" onclick="savePred('${m.id}')">✏️ Actualizar</button>`
                : !closed
                  ? `<button class="btn-save" id="sv-${m.id}" onclick="savePred('${m.id}')">Guardar</button>`
                  : ''}

          </div>
        </div>
        ${!closed ? renderTrends(m.id) : ''}
        ${canSeeBets(m) ? renderBetsPanel(m) : ''}
      </div>`;
  };

  // ── Partidos pendientes / en vivo ──
  if (predSortMode === 'fecha') {
    for (const m of filteredUpcoming) {
      html += cardHTML(m, preds.find(p => p.playerId===currentPlayer.id && p.matchId===m.id));
    }
  } else if (predSortMode === 'grupo') {
    const byKey = {}, keyOrder = [];
    for (const m of filteredUpcoming) {
      const key = m.group && m.group !== '?' ? m.group : (m.phase||'?');
      if (!byKey[key]) { byKey[key]=[]; keyOrder.push(key); }
      byKey[key].push(m);
    }
    keyOrder.sort((a,b) => {
      const aG=/^[A-Z]$/.test(a), bG=/^[A-Z]$/.test(b);
      if(aG&&bG) return a.localeCompare(b);
      if(aG) return -1; if(bG) return 1;
      return Object.keys(PHASES).indexOf(a) - Object.keys(PHASES).indexOf(b);
    });
    for (const key of keyOrder) {
      html += `<div class="sec-title">${/^[A-Z]$/.test(key)?'Grupo '+key:(PHASES[key]||key)}</div>`;
      for (const m of byKey[key]) {
        html += cardHTML(m, preds.find(p => p.playerId===currentPlayer.id && p.matchId===m.id));
      }
    }
  } else {
    // Por fase (default)
    const byPhase = {};
    for (const m of filteredUpcoming) { (byPhase[m.phase]=byPhase[m.phase]||[]).push(m); }
    const phOrd = Object.keys(PHASES);
    const sortedPhases = Object.keys(byPhase).sort((a,b) => phOrd.indexOf(a)-phOrd.indexOf(b));
    for (const phase of sortedPhases) {
      const quota = WC_QUOTA[phase] || 0;
      const mult  = PHASE_MULT[phase] || 1;
      const multTag = mult > 1 ? `<span style="color:var(--text-m);font-size:11px;margin-left:6px;font-weight:500;">×${mult} pts</span>` : '';
      let wcTag = '';
      if (quota > 0) {
        if (phase === 'grupos') {
          wcTag = `<span style="color:var(--gold);font-size:11px;margin-left:6px;">🎯 1 redoblona por grupo</span>`;
        } else {
          const rem = wcRemaining(myWC, phase, '');
          if (rem > 0) wcTag = `<span style="color:var(--gold);font-size:11px;margin-left:6px;">🎯 ${rem} redoblona${rem>1?'s':''} disponible${rem>1?'s':''}</span>`;
        }
      }
      html += `<div class="sec-title">${PHASES[phase]||phase}${multTag}${wcTag}</div>`;
      for (const m of byPhase[phase]) {
        html += cardHTML(m, preds.find(p => p.playerId===currentPlayer.id && p.matchId===m.id));
      }
    }
  }

  // ── Partidos finalizados ──
  if (filteredFinished.length) {
    html += `<div class="sec-title" style="color:var(--text-m);margin-top:8px;">✅ Finalizados (${filteredFinished.length})</div>`;
    for (const m of filteredFinished) {
      html += cardHTML(m, preds.find(p => p.playerId===currentPlayer.id && p.matchId===m.id));
    }
  }

  con.innerHTML = html;
}

function renderBetsPanel(m) {
  const allPreds = DB.getPredictions();
  const players  = DB.getPlayers();
  const wcs      = DB.getWildcards();
  const isLive   = m.status === 'live';
  const bettors  = players.filter(pl => allPreds.find(p => p.playerId===pl.id && p.matchId===m.id)).length;
  const label    = isLive
    ? '👁 Ver apuestas (' + players.length + ') · ⚡ En juego'
    : '👁 Ver apuestas (' + bettors + ' de ' + players.length + ')';

  // ── Filas de cada jugador ──
  let rowsHTML = '';
  for (const pl of players) {
    const pred = allPreds.find(p => p.playerId===pl.id && p.matchId===m.id);
    const isMe = pl.id === currentPlayer.id;
    const c    = color(pl.colorIdx);

    if (!pred) {
      // Sin pronóstico
      rowsHTML += '<div class="bet-row' + (isMe ? ' is-me' : '') + '">' +
        '<div class="ava" style="width:26px;height:26px;background:'+c.bg+';color:'+c.tc+';font-size:10px;flex-shrink:0;">'+initials(pl.name)+'</div>' +
        '<span style="font-size:13px;flex:1;color:var(--text-d);">'+pl.name+'</span>' +
        '<span style="font-size:11px;color:var(--text-d);font-style:italic;">Sin pronóstico</span>' +
        '</div>';
      continue;
    }

    const wcData = wcs[pl.id] || {};
    const isWC   = isWCUsed(wcData, m);
    // Puntos: exactos para finalizados (incluye risk bonus), provisorios para en vivo
    const pts    = m.status === 'finished'
      ? ptsEarnedInMatch(pl.id, m.id)
      : provPtsForMatch(pl.id, m.id);
    const risk   = m.status === 'finished'
      ? calcRiskBonus(pred, m.homeScore, m.awayScore, m.id, activePredictions())
      : 0;
    const res    = m.homeScore !== null ? betResult(pred, m.homeScore, m.awayScore) : '';
    const ptsCls = res==='exact' ? 'exact' : res==='partial' ? 'partial' : res==='wrong' ? 'wrong' : 'pending';
    const breakdown = (pts !== null && res !== '') ? pointsBreakdownForMatch(pl.id, m, pred) : null;
    const bdId = 'pb-' + String(m.id).replace(/[^a-zA-Z0-9_-]/g,'') + '-' + String(pl.id).replace(/[^a-zA-Z0-9_-]/g,'');

    let ptsLbl;
    if (pts === null || res === '') {
      ptsLbl = '–';
    } else if (res === 'exact') {
      ptsLbl = pts + ' pts 🎯';
    } else if (res === 'partial') {
      ptsLbl = pts + ' pt ✓';
    } else if (res === 'wrong') {
      ptsLbl = '0 ✗';
    } else {
      ptsLbl = pts > 0 ? '+' + pts : '–';
    }

    const ptsHTML = breakdown
      ? '<button type="button" class="bet-pts pts-toggle ' + ptsCls + '" onclick="event.stopPropagation();togglePointsBreakdown(\'' + bdId + '\')" title="Ver desglose de puntos">' + ptsLbl + '</button>'
      : '<span class="bet-pts ' + ptsCls + '">' + ptsLbl + '</span>';

    rowsHTML += '<div class="bet-row' + (isMe ? ' is-me' : '') + '">' +
      '<div class="ava" style="width:26px;height:26px;background:'+c.bg+';color:'+c.tc+';font-size:10px;flex-shrink:0;">'+initials(pl.name)+'</div>' +
      '<span style="font-size:13px;flex:1;' + (isMe ? 'font-weight:600;' : '') + '">' +
        pl.name + (isMe ? ' <span style="font-size:10px;color:var(--accent);">(vos)</span>' : '') +
      '</span>' +
      (isWC  ? '<span class="bet-badge">🎯</span>' : '') +
      (risk > 0 ? '<span class="risk-badge">🎲+' + risk + '</span>' : '') +
      '<div style="flex-shrink:0;min-width:38px;text-align:center;">' +
        '<div style="font-family:var(--fd);font-size:16px;font-weight:700;letter-spacing:.03em;">' + pred.homeScore + '-' + pred.awayScore + '</div>' +
        (m.homeScore !== null ? '<div style="font-size:10px;font-weight:600;margin-top:2px;color:' + (isLive ? '#f97316' : 'var(--text-m)') + ';">' + (isLive ? '⏱ ' : '✅ ') + m.homeScore + '-' + m.awayScore + '</div>' : '') +
      '</div>' +
      ptsHTML +
      renderPointsBreakdown(bdId, breakdown) +
      '</div>';
  }

  return '<div class="bets-toggle" id="bt-' + m.id + '" onclick="toggleBets(\'' + m.id + '\')">' +
      '<span>' + label + '</span>' +
      '<span class="toggle-icon">▼</span>' +
    '</div>' +
    '<div class="bets-panel" id="bp-' + m.id + '">' +
      rowsHTML +
      renderChatPanel(m.id) +
    '</div>';
}

function toggleBets(matchId) {
  const toggle = document.getElementById('bt-' + matchId);
  const panel  = document.getElementById('bp-' + matchId);
  if (!toggle || !panel) return;
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  toggle.classList.toggle('open', !isOpen);
}

function togglePointsBreakdown(id) {
  const box = document.getElementById(id);
  if (box) box.classList.toggle('open');
}

function activePredictions() {
  // Solo predicciones de jugadores que aún existen
  const playerIds = new Set(DB.getPlayers().map(p => p.id));
  return DB.getPredictions().filter(p => playerIds.has(p.playerId));
}

function renderTrends(matchId) {
  const playerIds = new Set(DB.getPlayers().map(p => p.id));
  const allPreds = DB.getPredictions().filter(p => p.matchId === matchId && playerIds.has(p.playerId));
  const total = allPreds.length;
  const players = DB.getPlayers();
  if (!total) return `<div class="trends-box"><div class="trends-title">📊 Tendencias · Nadie apostó todavía</div></div>`;

  const homeWins = allPreds.filter(p => p.homeScore > p.awayScore).length;
  const draws    = allPreds.filter(p => p.homeScore === p.awayScore).length;
  const awayWins = allPreds.filter(p => p.homeScore < p.awayScore).length;
  const m = matches.find(x => x.id === matchId);

  const bar = (count, color) => {
    const pct = total > 0 ? Math.round(count/total*100) : 0;
    return `<div class="trend-row">
      <span class="trend-label">${color === '#4ade80' ? (m?.homeTeam?.split(' ')[0]||'Local') : color === '#94a3b8' ? 'Empate' : (m?.awayTeam?.split(' ')[0]||'Visit.')}</span>
      <div class="trend-bar-wrap"><div class="trend-bar" style="width:${pct}%;background:${color};"></div></div>
      <span class="trend-pct" style="color:${color};">${pct}%</span>
    </div>`;
  };

  // Top marcadores apostados
  const scoreCounts = {};
  for (const p of allPreds) {
    const k = `${p.homeScore}-${p.awayScore}`;
    scoreCounts[k] = (scoreCounts[k]||0)+1;
  }
  const topScores = Object.entries(scoreCounts).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const topHtml = topScores.map(([sc, n]) =>
    `<span style="font-size:11px;background:var(--bg-card);padding:2px 8px;border-radius:4px;border:.5px solid var(--border-md);">${sc} <span style="color:var(--text-m);">(${n})</span></span>`
  ).join('');

  return `<div class="trends-box">
    <div class="trends-title">📊 Tendencias · ${total} de ${players.length} apostaron</div>
    ${bar(homeWins,'#4ade80')}
    ${bar(draws,'#94a3b8')}
    ${bar(awayWins,'#60a5fa')}
    ${topScores.length ? `<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">${topHtml}</div>` : ''}
  </div>`;
}

function canUseWC(wcData, m) {
  if (!wcData) return false;
  const rem = wcRemaining(wcData, m.phase, m.group);
  return rem > 0 || isWCUsed(wcData, m);
}

function checkPenSelector(matchId) {
  const h = document.getElementById('h-'+matchId)?.value;
  const a = document.getElementById('a-'+matchId)?.value;
  const row = document.getElementById('pen-row-'+matchId);
  if (!row) return;
  const isDraw = h!=='' && a!=='' && parseInt(h)===parseInt(a);
  row.style.display = isDraw ? 'block' : 'none';
  if (!isDraw) {
    document.getElementById('pen-h-'+matchId)?.classList.remove('active');
    document.getElementById('pen-a-'+matchId)?.classList.remove('active');
  }
}

function setPenWinner(matchId, isHome) {
  const hBtn = document.getElementById('pen-h-'+matchId);
  const aBtn = document.getElementById('pen-a-'+matchId);
  if (isHome) { hBtn?.classList.add('active'); aBtn?.classList.remove('active'); }
  else        { aBtn?.classList.add('active'); hBtn?.classList.remove('active'); }
}

function savePred(matchId) {
  const h = document.getElementById('h-'+matchId).value;
  const a = document.getElementById('a-'+matchId).value;
  if (h===''||a==='') { toast('Ingresá ambos marcadores','err'); return; }
  const m = matches.find(x => x.id === matchId);
  if (m && isClosed(m)) { toast('El partido ya no acepta pronósticos','err'); return; }
  const hInt = parseInt(h), aInt = parseInt(a);
  let penWinner = null;
  if (PLAYOFF_PHASES.has(m?.phase) && hInt===aInt) {
    if (document.getElementById('pen-h-'+matchId)?.classList.contains('active')) penWinner = m.homeCode;
    else if (document.getElementById('pen-a-'+matchId)?.classList.contains('active')) penWinner = m.awayCode;
  }
  const preds = DB.getPredictions();
  const idx   = preds.findIndex(p => p.playerId===currentPlayer.id && p.matchId===matchId);
  const rec   = { id:genId(), playerId:currentPlayer.id, matchId, homeScore:hInt, awayScore:aInt };
  if (penWinner) rec.penWinner = penWinner;
  if (idx>=0) preds[idx]=rec; else preds.push(rec);
  DB.savePredictions(preds);
  const btn = document.getElementById('sv-'+matchId);
  if (btn) { btn.textContent='✓ Guardado'; btn.classList.add('saved'); }
  toast('Pronóstico guardado ✓','ok');
}

function toggleWC(matchId) {
  const m = matches.find(x=>x.id===matchId);
  if (!m || isClosed(m)) return;
  if ((WC_QUOTA[m.phase]||0) === 0) { toast('No hay redoblona disponible en esta fase','err'); return; }
  const wcs = DB.getWildcards();
  let wcData = wcs[currentPlayer.id] || {};
  const currently = isWCUsed(wcData, m);
  if (currently) {
    if (m.phase==='grupos') {
      if (!wcData.grupos) wcData.grupos={};
      delete wcData.grupos[m.group];
    } else {
      const used = wcData[m.phase] || [];
      const arr = Array.isArray(used) ? used : [used];
      wcData[m.phase] = arr.filter(id=>id!==matchId);
      if (wcData[m.phase].length===0) delete wcData[m.phase];
    }
    toast('Redoblona quitada');
  } else {
    const rem = wcRemaining(wcData, m.phase, m.group);
    if (rem <= 0) { toast('No te quedan redoblones en esta fase','err'); return; }
    if (m.phase==='grupos') {
      if (!wcData.grupos) wcData.grupos={};
      wcData.grupos[m.group] = matchId;
    } else {
      if (!wcData[m.phase]) wcData[m.phase]=[];
      if (!Array.isArray(wcData[m.phase])) wcData[m.phase]=[wcData[m.phase]];
      wcData[m.phase].push(matchId);
    }
    toast('🎯 Redoblona activada — puntos ×2','ok');
  }
  wcs[currentPlayer.id] = wcData;
  DB.saveWildcards(wcs);
  renderView(currentView);
}

function saveSpecial(type) {
  if (new Date() >= MUNDIAL_START) { toast('Los pronósticos especiales están cerrados','err'); return; }
  const idMap = { champion:'sp-champ', subCampeon:'sp-sub', tercerPuesto:'sp-third', scorer:'sp-scorer' };
  const val = document.getElementById(idMap[type])?.value.trim();
  if (!val) { toast('Ingresá el valor','err'); return; }
  const specials = DB.getSpecial();
  let sp = specials.find(s => s.playerId===currentPlayer.id);
  if (!sp) { sp={id:genId(),playerId:currentPlayer.id}; specials.push(sp); }
  if (type==='champion') sp.champion=val;
  else if (type==='subCampeon') sp.subCampeon=val;
  else if (type==='tercerPuesto') sp.tercerPuesto=val;
  else sp.topScorer=val;
  DB.saveSpecial(specials);
  toast('Pronóstico especial guardado 🏆','ok');
  renderView('predictions');
}

let rankingView = 'general'; // 'general' | day string (toDateString)

// MVP por jornada: calcula quién lideró cada día
function getMvpData() {
  const jornadasMap = {};
  for (const m of matches.filter(x => x.status === 'finished')) {
    const day = new Date(m.kickoff||m.date).toDateString();
    jornadasMap[day] = true;
  }
  const sortedDays = Object.keys(jornadasMap).sort((a, b) => new Date(a) - new Date(b));

  const mvpCounts  = {}; // playerId → cantidad de jornadas MVP
  const mvpHistory = []; // [{day, winners, pts, jNum}]

  sortedDays.forEach((day, i) => {
    const scores = scoresByJornada(day).filter(p => p.pts > 0);
    if (!scores.length) return;
    const topPts   = scores[0].pts;
    const winners  = scores.filter(p => p.pts === topPts);
    winners.forEach(w => { mvpCounts[w.id] = (mvpCounts[w.id] || 0) + 1; });
    mvpHistory.push({ day, winners, pts: topPts, jNum: i + 1 });
  });

  const lastMvp = mvpHistory.length ? mvpHistory[mvpHistory.length - 1] : null;
  return { mvpCounts, lastMvp };
}

// Puntuación por jornada (agrupar por día)
function scoresByJornada(jornadaKey) {
  const dayMatches = matches.filter(m => {
    const day = new Date(m.kickoff||m.date).toDateString();
    return m.status==='finished' && day===jornadaKey;
  });
  return DB.getPlayers().map(p => ({
    ...p,
    pts: dayMatches.reduce((sum, m) => sum + ptsEarnedInMatch(p.id, m.id), 0),
    games: dayMatches.filter(m => DB.getPredictions().find(x => x.playerId===p.id && x.matchId===m.id)).length,
  })).sort((a, b) => b.pts - a.pts);
}

function setRankingView(v) { rankingView = v; renderView('ranking'); }

function renderRanking(con) {
  const scores = allScores();
  if (!scores.length) {
    con.innerHTML='<div class="empty"><div class="empty-icon">👥</div><p>Aún no hay jugadores registrados.</p></div>'; return;
  }

  // Construir lista de jornadas (días con partidos finalizados)
  const jornadasMap = {};
  for (const m of matches.filter(x => x.status === 'finished')) {
    const day = new Date(m.kickoff||m.date).toDateString();
    jornadasMap[day] = (jornadasMap[day] || 0) + 1;
  }
  const jornadas = Object.keys(jornadasMap);

  // Tabs de jornada
  let tabsHTML = '<div class="jornada-tabs"><button class="jornada-tab' +
    (rankingView==='general' ? ' active' : '') +
    '" onclick="setRankingView(\'general\')">📊 General</button>';
  jornadas.forEach((day, i) => {
    tabsHTML += '<button class="jornada-tab' + (rankingView===day ? ' active' : '') +
      '" onclick="setRankingView(\'' + day + '\')">Jornada ' + (i+1) + '</button>';
  });
  tabsHTML += '</div>';

  // Datos MVP (usado en ambas vistas)
  const { mvpCounts, lastMvp } = getMvpData();

  // ── VISTA JORNADA ──
  if (rankingView !== 'general') {
    const jScores    = scoresByJornada(rankingView).filter(p => p.games > 0 || p.pts > 0);
    const dayMatches = matches.filter(m => new Date(m.kickoff||m.date).toDateString() === rankingView && m.status === 'finished');
    const matchSummary = dayMatches.map(m => m.homeTeam+' '+m.homeScore+'-'+m.awayScore+' '+m.awayTeam).join(' · ');
    const jTopPts    = jScores.length ? jScores[0].pts : -1;
    let rowsHTML = '';
    jScores.forEach((p, i) => {
      const isMe    = p.id === currentPlayer.id;
      const isMvp   = p.pts > 0 && p.pts === jTopPts;
      const ptColor = p.pts > 0 ? 'var(--accent)' : p.pts < 0 ? 'var(--danger)' : 'var(--text-d)';
      rowsHTML += '<div class="rank-row' + (isMe ? ' me' : '') + '">' +
        '<span class="rank-num">' + (i+1) + '</span>' +
        avaEl(p, 32) +
        '<div class="rank-info">' +
          '<div class="rank-name">' + p.name + (isMe ? ' <span style="font-size:10px;color:var(--accent);">· vos</span>' : '') + '</div>' +
          '<div class="rank-stats">' + p.games + ' partido' + (p.games!==1?'s':'') + ' apostados</div>' +
        '</div>' +
        (isMvp ? '<span class="mvp-badge">🏅 MVP</span>' : '') +
        '<span class="rank-pts" style="color:' + ptColor + ';">' + (p.pts>0?'+':'') + p.pts + '</span>' +
        '</div>';
    });
    if (!jScores.length) rowsHTML = '<div style="padding:16px;text-align:center;color:var(--text-d);font-size:13px;">Nadie apostó en esta jornada</div>';
    con.innerHTML = tabsHTML +
      renderSponsorBox('ranking-sponsor') +
      '<div style="font-size:12px;color:var(--text-m);margin:8px 0 10px;">' + matchSummary + '</div>' +
      '<div class="card" style="padding:0 16px;">' + rowsHTML + '</div>';
    return;
  }

  // ── VISTA GENERAL ──

  // Card MVP de la última jornada
  let mvpCardHTML = '';
  if (lastMvp) {
    const winnerNames = lastMvp.winners.map(w => w.name).join(' & ');
    const isTie       = lastMvp.winners.length > 1;
    const isMe        = lastMvp.winners.some(w => w.id === currentPlayer.id);
    mvpCardHTML = '<div class="mvp-card">' +
      '<div class="mvp-crown">🏅</div>' +
      '<div class="mvp-card-info">' +
        '<div class="mvp-card-label">MVP · Jornada ' + lastMvp.jNum + '</div>' +
        '<div class="mvp-card-name">' + winnerNames + (isMe ? ' <span style="font-size:11px;color:var(--accent);">(vos 🎉)</span>' : '') + '</div>' +
        '<div class="mvp-card-sub">' + (isTie ? 'Empate en ' : '') + lastMvp.pts + ' pts este día</div>' +
      '</div>' +
      '<div class="mvp-card-pts">+' + lastMvp.pts + '</div>' +
      '</div>';
  }

  let podHTML = '<div class="podium-wrap">';
  const podOrder = scores.length>=3 ? [scores[1],scores[0],scores[2]]
                 : scores.length===2 ? [scores[1],scores[0]] : [scores[0]];
  const pbClass  = scores.length>=2 ? ['pb2','pb1','pb3'] : ['pb1'];
  const medals   = scores.length>=2 ? ['🥈','👑','🥉'] : ['👑'];
  const pColors  = ['var(--silver)','var(--gold)','var(--bronze)'];

  podOrder.forEach((p,i) => {
    const c    = color(p.colorIdx);
    const ci   = scores.length>=2 ? i : 0;
    const ptsC = pColors[ci] || 'var(--text)';
    podHTML += '<div class="podium-col">' +
      '<div class="podium-ava" style="background:'+c.bg+';color:'+c.tc+';border:2px solid '+ptsC+';">'+initials(p.name)+'</div>' +
      '<div class="podium-block '+(pbClass[ci]||'pb1')+'">' +
        '<span style="font-size:'+(ci===1?'22':'16')+'px;margin-bottom:2px;">'+medals[ci]+'</span>' +
        '<span class="podium-pts" style="color:'+ptsC+';">'+p.pts+'</span>' +
      '</div>' +
      '<div class="podium-name">'+p.name+'</div>' +
      '</div>';
  });
  podHTML += '</div>';

  // Snapshot anterior para calcular cambios de posición
  const snaps = Array.isArray(DB.getSnapshots()) ? DB.getSnapshots() : [];
  const prevSnap = snaps.length >= 2 ? snaps[snaps.length - 2] : null;
  const goldColors = ['var(--gold)','var(--silver)','var(--bronze)'];

  let tableHTML = '<div class="card" style="padding:0 16px;">';
  scores.forEach((p,i) => {
    const isMe    = p.id === currentPlayer.id;
    const curRank = i + 1;
    const myMvps  = mvpCounts[p.id] || 0;
    let deltaHTML = '';
    if (prevSnap && prevSnap.ranks && prevSnap.ranks[p.id]) {
      const prevRank = prevSnap.ranks[p.id].rank;
      const diff = prevRank - curRank;
      if (diff > 0)      deltaHTML = '<span style="font-size:11px;color:var(--accent);font-weight:700;">▲'+diff+'</span>';
      else if (diff < 0) deltaHTML = '<span style="font-size:11px;color:var(--danger);font-weight:700;">▼'+Math.abs(diff)+'</span>';
      else               deltaHTML = '<span style="font-size:11px;color:var(--text-d);">═</span>';
    }
    const unlockedAchs = ACHIEVEMENTS.filter(a => a.check(p, curRank));
    const achLine = unlockedAchs.length
      ? '<div style="font-size:13px;margin-top:2px;letter-spacing:.05em;" title="'+unlockedAchs.map(a=>a.title).join(' · ')+'">'+unlockedAchs.map(a=>a.icon).join('')+'</div>'
      : '';
    tableHTML += '<div class="rank-row'+(isMe?' me':'')+'">'+
      '<span class="rank-num" style="color:'+(i<3?goldColors[i]:'var(--text-d)')+';">'+curRank+'</span>'+
      avaEl(p,36)+
      '<div class="rank-info">'+
        '<div class="rank-name">'+p.name+(isMe?' <span style="font-size:10px;color:var(--accent);">· vos</span>':'')+'</div>'+
        '<div class="rank-stats">🎯 '+p.exact+' exactos &nbsp;✓ '+p.partial+' parciales</div>'+
        achLine+
      '</div>'+
      deltaHTML+
      (myMvps > 0 ? '<span class="mvp-badge">🏅 ×'+myMvps+'</span>' : '')+
      (p.curStreak>=2 ? '<span class="streak-badge">🔥 '+p.curStreak+'</span>' : '')+
      '<span class="rank-pts">'+p.pts+'</span>'+
      '</div>';
  });
  tableHTML += '</div>';

  con.innerHTML = tabsHTML + renderSponsorBox('ranking-sponsor') + mvpCardHTML + podHTML + tableHTML;
}

// ╔══════════════════════════════════════════════════╗
// ║  HISTORY VIEW                                     ║
// ╚══════════════════════════════════════════════════╝
function renderHistory(con) {
  const finished = matches.filter(m => m.status==='finished');
  const preds    = DB.getPredictions().filter(p => p.playerId===currentPlayer.id);
  const myWC     = DB.getWildcards()[currentPlayer.id] || {};

  if (!finished.length) {
    con.innerHTML='<div class="empty"><div class="empty-icon">📭</div><p>Aún no hay partidos finalizados.</p></div>'; return;
  }

  let cardsHTML = '';
  for (const m of [...finished].reverse()) {
    const p    = preds.find(x => x.matchId===m.id);
    const isWC = isWCUsed(myWC, m);
    let pillC='pill-wrong', pillT='0 pts';
    let pts = 0;

    if (p) {
      pts = ptsEarnedInMatch(currentPlayer.id, m.id);
      const raw = calcPtsBase(p, m.homeScore, m.awayScore);
      if (raw===5) { pillC='pill-exact'; pillT=`+${pts} pts${isWC?' 🎯':''}`; }
      else if (raw>=3) { pillC='pill-partial'; pillT=`+${pts} pts${isWC?' 🎯':''}`; }
    }

    cardsHTML += `<div class="match-card">
      <div class="match-meta">
        <span>${PHASES[m.phase]||m.phase}${m.group&&m.group!=='?'?' · Grupo '+m.group:''}</span>
        <span>${fmtDate(m.kickoff||m.date)}</span>
      </div>
      <div class="match-body">
        <div class="team-side">
          <div class="team-flag">${renderFlag(m.homeCode, m.homeTeam)}</div>
          <div class="team-name">${m.homeTeam}</div>
        </div>
        <div style="text-align:center;flex-shrink:0;">
          <div style="font-family:var(--fd);font-size:28px;font-weight:700;letter-spacing:.05em;">${m.homeScore} : ${m.awayScore}</div>
          <div style="font-size:11px;color:var(--text-m);margin-top:2px;">Resultado oficial</div>
          <div style="font-size:12px;color:var(--text-d);margin-top:4px;">${p?`Tu pred: ${p.homeScore}-${p.awayScore}`:'Sin pronóstico'}</div>
        </div>
        <div class="team-side">
          <div class="team-flag">${renderFlag(m.awayCode, m.awayTeam)}</div>
          <div class="team-name">${m.awayTeam}</div>
        </div>
      </div>
      <div class="match-footer" style="justify-content:flex-end;">
        <span class="pill ${pillC}">${pillT}</span>
      </div>
    </div>`;
  }

  const score = scorePlayer(currentPlayer.id);
  con.innerHTML = `
    <div class="card" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div>
        <div style="font-size:12px;color:var(--text-m);">Total acumulado</div>
        <div style="font-family:var(--fd);font-size:32px;font-weight:700;color:var(--accent);">${score.pts} pts</div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:12px;color:var(--text-m);">Exactos / Parciales</div>
        <div style="font-family:var(--fd);font-size:28px;font-weight:700;">${score.exact} <span style="color:var(--text-d);">/</span> ${score.partial}</div>
      </div>
    </div>
  ` + cardsHTML;
}

// ╔══════════════════════════════════════════════════╗
// ║  LOGROS VIEW                                      ║
// ╚══════════════════════════════════════════════════╝
function renderLogros(con) {
  const scores  = allScores();
  const myRank  = scores.findIndex(s => s.id===currentPlayer.id)+1;
  const mySc    = scores.find(s => s.id===currentPlayer.id) || {};
  const unlocked = ACHIEVEMENTS.filter(a => a.check(mySc,myRank));

  con.innerHTML = `
    <div class="card" style="text-align:center;margin-bottom:16px;">
      <div style="font-size:13px;color:var(--text-m);margin-bottom:4px;">Logros desbloqueados</div>
      <div style="font-family:var(--fd);font-size:36px;font-weight:700;color:var(--gold);">${unlocked.length} <span style="font-size:20px;color:var(--text-m);">/ ${ACHIEVEMENTS.length}</span></div>
    </div>
    <div class="ach-grid">
      ${ACHIEVEMENTS.map(a => {
        const ok = a.check(mySc,myRank);
        return `<div class="ach-card ${ok?'unlocked':'locked'}">
          <div class="ach-icon">${a.icon}</div>
          <div class="ach-title">${a.title}</div>
          <div class="ach-desc">${a.desc}</div>
          <div class="ach-status" style="color:${ok?'var(--accent)':'var(--text-d)'};">${ok?'✓ Desbloqueado':'🔒 Pendiente'}</div>
        </div>`;
      }).join('')}
    </div>`;
}

        ${DB.getPlayers().length === 0

          : DB.getPlayers().map(p => {
              const c = color(p.colorIdx);
              return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:.5px solid var(--border);">

function authAdmin() {
  if (document.getElementById('ap').value === ADMIN_PASS) {
    adminAuth = true; renderView('admin');
  } else { toast('Contraseña incorrecta','err'); }
}

function saveRankSnapshot(matchId, matchLabel) {
  const scores = allScores();
  const snap = { matchId, label: matchLabel, ts: Date.now(), ranks: {} };
  scores.forEach((p, i) => { snap.ranks[p.id] = { rank: i + 1, pts: p.pts }; });
  const snaps = Array.isArray(DB.getSnapshots()) ? DB.getSnapshots() : [];
  const updated = snaps.filter(s => s.matchId !== matchId);
  updated.push(snap);
  DB.saveSnapshots(updated);
}

function adminResult(matchId) {
  const h = document.getElementById('rh-'+matchId).value;
  const a = document.getElementById('ra-'+matchId).value;
  if (h===''||a==='') { toast('Ingresá el resultado','err'); return; }
  const m = matches.find(x => x.id===matchId);
  if (!m) return;
  m.status='finished';
  m.homeScore=parseInt(h);
  m.awayScore=parseInt(a);
  m.manualOverride=true;
  saveCachedMatches(matches);
  saveRankSnapshot(matchId, m.homeTeam+' '+h+'-'+a+' '+m.awayTeam);
  toast(m.homeTeam+' '+h+' – '+a+' '+m.awayTeam+' ✓','ok');
  renderView('admin');
}

function adminResetMatch(matchId) {
  const m = matches.find(x => x.id===matchId);
  if (!m) return;
  if (!confirm('¿Revertir "'+m.homeTeam+' vs '+m.awayTeam+'" a pendiente?\nEl resultado volverá a depender de FIFA.')) return;
  m.status='upcoming';
  m.homeScore=null;
  m.awayScore=null;
  delete m.manualOverride;
  saveCachedMatches(matches);
  toast('Partido revertido — esperando datos de FIFA','ok');
  renderView('admin');
}

// ── Gestión manual de partidos (solo versión PRUEBA) ──
function adminToggleScoreInputs(matchId) {
  const status = document.getElementById('ms-status-'+matchId)?.value;
  const isPending = status === 'pending';
  const hs = document.getElementById('ms-hs-'+matchId);
  const as = document.getElementById('ms-as-'+matchId);
  if (hs) hs.disabled = isPending;
  if (as) as.disabled = isPending;
}

function adminSaveMatch(matchId) {
  const m = matches.find(x=>x.id===matchId);
  if (!m) return;
  const status = document.getElementById('ms-status-'+matchId).value;
  const hsVal  = document.getElementById('ms-hs-'+matchId).value;
  const asVal  = document.getElementById('ms-as-'+matchId).value;
  m.status = status;
  if (status === 'pending') {
    m.homeScore = null; m.awayScore = null;
  } else {
    m.homeScore = hsVal !== '' ? parseInt(hsVal) : null;
    m.awayScore = asVal !== '' ? parseInt(asVal) : null;
  }
  saveCachedMatches(matches);
  toast('Partido actualizado ✓', 'ok');
  renderView('admin');
}

function adminAddMatch() {
  const home     = document.getElementById('nm-home').value.trim();
  const away     = document.getElementById('nm-away').value.trim();
  const homeCode = document.getElementById('nm-home-code').value.trim().toUpperCase();
  const awayCode = document.getElementById('nm-away-code').value.trim().toUpperCase();
  const phase    = document.getElementById('nm-phase').value;
  const group    = document.getElementById('nm-group').value.trim().toUpperCase();
  const kickoff  = document.getElementById('nm-kickoff').value;
  if (!home || !away) { toast('Ingresá ambos equipos', 'err'); return; }
  matches.push({
    id: genId(),
    homeTeam: home,  homeCode: homeCode || '???',
    awayTeam: away,  awayCode: awayCode || '???',
    phase, group: group || '?',
    kickoff: kickoff ? new Date(kickoff).toISOString() : new Date().toISOString(),
    status: 'pending', homeScore: null, awayScore: null
  });
  saveCachedMatches(matches);
  toast('Partido creado ✓', 'ok');
  renderView('admin');
}

function adminDeleteMatch(matchId) {
  if (!confirm('¿Eliminar este partido?')) return;
  matches = matches.filter(x=>x.id!==matchId);
  saveCachedMatches(matches);
  toast('Partido eliminado', 'ok');
  renderView('admin');
}

function adminClose(matchId) {
  const m = matches.find(x => x.id===matchId);
  if (!m) return;
  m.status='closed';
  saveCachedMatches(matches);
  toast('Pronósticos cerrados para ese partido','ok');

}

function saveMeta(type) {
  const idMap = { champion:'meta-champ', subCampeon:'meta-sub', tercerPuesto:'meta-third', scorer:'meta-scorer' };
  const val = document.getElementById(idMap[type])?.value.trim();
  if (!val) { toast('Ingresá el valor','err'); return; }
  const meta = DB.get('meta',{});
  if (type==='champion') meta.champion=val;
  else if (type==='subCampeon') meta.subCampeon=val;
  else if (type==='tercerPuesto') meta.tercerPuesto=val;
  else meta.topScorer=val;
  DB.set('meta',meta);
  toast('Guardado — se recalculan los puntos especiales ✓','ok');
}

function exportData() {
  const data = {
    players:DB.getPlayers(), matches,
    predictions:DB.getPredictions(), wildcards:DB.getWildcards(),
    special:DB.getSpecial(), meta:DB.get('meta',{})
  };
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download=`mundial2026_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
  toast('Exportado ✓','ok');
}

function importData() {
  const input = document.createElement('input');
  input.type='file'; input.accept='.json';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if (d.players)     DB.savePlayers(d.players);
        if (d.matches)     { matches = d.matches; saveCachedMatches(matches); }
        if (d.predictions) DB.savePredictions(d.predictions);
        if (d.wildcards)   DB.saveWildcards(d.wildcards);
        if (d.special)     DB.saveSpecial(d.special);
        if (d.meta)        DB.set('meta',d.meta);
        toast('Datos importados ✓','ok');
        renderView('admin');
      } catch { toast('Archivo inválido','err'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function adminDeletePlayer(playerId) {
  const players = DB.getPlayers();
  const p = players.find(x => x.id === playerId);
  if (!p) return;
  if (!confirm(`¿Eliminar a ${p.name}? Sus pronósticos también serán borrados.`)) return;
  // Borrar jugador
  DB.savePlayers(players.filter(x => x.id !== playerId));
  // Borrar sus pronósticos
  DB.savePredictions(DB.getPredictions().filter(x => x.playerId !== playerId));
  // Borrar sus wildcards
  const wc = DB.getWildcards();
  delete wc[playerId];
  DB.saveWildcards(wc);
  // Borrar sus especiales
  DB.saveSpecial(DB.getSpecial().filter(x => x.playerId !== playerId));
  toast(`${p.name} eliminado ✓`, 'ok');
  renderView('admin');
}

function adminResetPin(playerId) {
  const players = DB.getPlayers();
  const p = players.find(x => x.id === playerId);
  if (!p) return;
  if (!confirm(`¿Resetear el PIN de ${p.name}?\nLa próxima vez que ingrese podrá elegir un PIN nuevo.`)) return;
  delete p.pinHash;
  DB.savePlayers(players);
  toast(`PIN de ${p.name} reseteado ✓`, 'ok');
  renderView('admin');
}

function clearPlayers() {
  if (!confirm('¿Borrar todos los jugadores y pronósticos?\nLos partidos y resultados de FIFA no se tocan.')) return;
  DB.savePlayers([]);
  DB.savePredictions([]);
  DB.saveWildcards({});
  DB.saveSpecial([]);
  DB.set('meta', {});
  toast('Jugadores y pronósticos borrados ✓', 'ok');
  sessionStorage.removeItem('wc26_cp');
  currentPlayer = null;
  setTimeout(() => {
    document.getElementById('app').style.display = 'none';
    const sel = document.getElementById('player-select');
    sel.style.display = 'flex';
    sel.innerHTML = renderLoginScreen();
  }, 800);
}

function clearAll() {
  DB.savePlayers([]); DB.savePredictions([]); DB.saveWildcards({}); DB.saveSpecial([]); DB.set('meta',{});
  matches = []; localStorage.removeItem(MATCH_CACHE_KEY);
  if (_fbDatabase) _fbDatabase.ref(FB_ROOT + '/fifa_matches').remove().catch(()=>{});
  fifaSource = 'Sin datos';
  toast('Datos borrados','err');
  changePlayer();
}

(async function init() {
  // 1. Mostrar pantalla de carga
  const selEl = document.getElementById('player-select');
  selEl.style.display = 'flex';
  selEl.innerHTML = `
    <div style="text-align:center;padding:2rem;">
      <img class="brand-logo loading" src="albipolla-icon-512-v5.png" alt="ALBIPOLLA">
      <div class="brand-title" style="color:#ecfdf5;">ALBIPOLLA</div>
      <div style="font-size:13px;color:#7a9e82;margin-top:.5rem;">Conectando al servidor...</div>
    </div>`;

  // 2. Conectar Firebase
  try {
    await initFirebase();
  } catch(e) {
    console.error('Firebase init error:', e);
    selEl.innerHTML = '<div style="text-align:center;padding:2rem;max-width:340px;">'+
      '<div style="font-size:40px;">🔌</div>'+
      '<div style="font-size:16px;font-weight:600;margin-top:1rem;color:#f87171;">Sin conexión</div>'+
      '<div style="font-size:13px;color:#7a9e82;margin-top:.5rem;line-height:1.6;">'+
      'No se pudo conectar a Firebase.<br>Error: '+String(e.message||e)+
      '</div>'+
      '<button onclick="location.reload()" style="margin-top:1.5rem;padding:10px 20px;background:#4ade80;color:#0e1a10;border:none;border-radius:8px;font-weight:700;cursor:pointer;">🔄 Reintentar</button>'+
      '</div>';
    return;
  }

  // 3. Cargar partidos: primero caché local, luego Firebase, luego FIFA en background
  matches = loadCachedMatches();
  if (!matches.length) {
    // Intentar desde Firebase
    await new Promise(resolve => {
      loadCachedMatchesFromFirebase(fbMatches => {
        if (fbMatches.length) { matches = fbMatches; saveCachedMatches(fbMatches); }
        resolve();
      });
    });
  }
  fifaSource = matches.length ? `Caché · ${matches.length} partidos` : 'Sin datos';

  // 4. Restaurar HTML del player-select
  try {
    selEl.innerHTML = renderLoginScreen();
  } catch(e) {
    console.error('renderLoginScreen error:', e);
    selEl.innerHTML = '<div style="text-align:center;padding:2rem;"><img class="brand-logo loading" src="albipolla-icon-512-v5.png" alt="ALBIPOLLA">'+
      '<div class="brand-title">ALBIPOLLA</div>'+
      '<div style="font-size:12px;color:#f87171;margin-top:.5rem;">Error al cargar pantalla: '+String(e.message||e)+'</div>'+
      '<button onclick="location.reload()" style="margin-top:1rem;padding:10px 20px;background:#4ade80;color:#0e1a10;border:none;border-radius:8px;font-weight:700;cursor:pointer;">🔄 Recargar</button>'+
      '</div>';
  }

  // 5. Restaurar sesión — primero sessionStorage (pestaña actual), luego localStorage (recordarme)
  let autoLogged = false;
  const savedSession = sessionStorage.getItem('wc26_cp');
  const savedRemember = localStorage.getItem('wc26_remember');

  if (savedSession) {
    try {
      const sp = JSON.parse(savedSession);
      const found = DB.getPlayers().find(x => x.id===sp.id);
      if (found) { currentPlayer=found; showApp(); autoLogged=true; }
    } catch {}
  }
  if (!autoLogged && savedRemember) {
    try {
      const sr = JSON.parse(savedRemember);
      const found = DB.getPlayers().find(x => x.id===sr.id);
      if (found) {
        currentPlayer=found;
        sessionStorage.setItem('wc26_cp', JSON.stringify(found));
        showApp();
        autoLogged=true;
      }
    } catch {}
  }
  if (!autoLogged) renderPlayerSelect();

  // 6. Cargar fixture desde FIFA (solo estructura — estado y marcador se controlan manualmente)
  loadFifaMatches({ silent: true });

  // 7. Registrar Service Worker (PWA)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/mundial2026/sw.js?v=5', { scope: '/mundial2026/' })
      .then(reg => console.log('SW registrado:', reg.scope))
      .catch(err => console.warn('SW error:', err));
  }
})();

        Cuartos <strong style="color:var(--accent);">×4</strong> &nbsp;·&nbsp;
        Semis <strong style="color:var(--accent);">×5</strong> &nbsp;·&nbsp;
        3er Puesto <strong style="color:var(--accent);">×5</strong> &nbsp;·&nbsp;
        Final <strong style="color:var(--accent);">×7</strong>
      </div>
    </div>

    <div class="rules-section">
      <div class="rules-section-title">Bonus por penales (si pronosticás empate)</div>
      <p style="font-size:13px;color:var(--text-m);line-height:1.6;margin-bottom:10px;">
        Si pronosticás empate en una fase de mata-mata, podés elegir quién gana en penales. Si acertás:
      </p>
      <div class="example-box">
        <div class="example-row"><span>16vos de Final</span><span class="example-pts" style="color:var(--gold);">+2 pts</span></div>
        <div class="example-row"><span>8vos de Final</span><span class="example-pts" style="color:var(--gold);">+4 pts</span></div>
        <div class="example-row"><span>Cuartos de Final</span><span class="example-pts" style="color:var(--gold);">+6 pts</span></div>
        <div class="example-row"><span>Semifinales</span><span class="example-pts" style="color:var(--gold);">+8 pts</span></div>
        <div class="example-row"><span>3er Puesto</span><span class="example-pts" style="color:var(--gold);">+10 pts</span></div>
        <div class="example-row" style="border-bottom:none;"><span>Final</span><span class="example-pts" style="color:var(--gold);">+12 pts</span></div>
      </div>
      <p style="font-size:12px;color:var(--text-m);margin-top:10px;line-height:1.5;">
        Ejemplo en 16vos — Brasil 1-1 España (Brasil gana penales):<br>
        Apostás 1-1 + Brasil penales → 5 × 2 + 2 = <strong style="color:var(--accent);">12 pts</strong><br>
        Con redoblona → (5×2+2) × 2 = <strong style="color:var(--accent);">24 pts 🎯</strong>
      </p>
    </div>`;

  if (tab === 'especiales') return `
    <div class="rules-section">
      <div class="rules-section-title">Pronósticos especiales</div>
      <p style="font-size:13px;color:var(--text-m);line-height:1.6;margin-bottom:14px;">
        Antes de que empiece el torneo podés apostar por el campeón y el goleador. Estos pronósticos se <strong style="color:var(--text);">bloquean definitivamente</strong> cuando comienza el primer partido.
      </p>
      <table class="pts-table">
        <tr>
          <td class="pts-val gold">+15</td>
          <td>
            <div class="pts-desc"><strong>🥇 Campeón del Mundial</strong></div>
            <div class="pts-sub">Acertás qué selección levanta la copa. Solo hay una respuesta correcta.</div>
          </td>
        </tr>
        <tr>
          <td class="pts-val gold">+10</td>
          <td>
            <div class="pts-desc"><strong>⚽ Goleador del torneo</strong></div>
            <div class="pts-sub">Acertás el jugador con más goles al final del Mundial.</div>
          </td>
        </tr>
      </table>
    </div>

    <div class="rules-section">
      <div class="rules-section-title">Cuándo se suman estos puntos</div>
      <p style="font-size:13px;color:var(--text-m);line-height:1.6;">
        El organizador carga el campeón y el goleador al final del torneo. Los puntos se suman automáticamente a todos los que lo hayan acertado.
      </p>
    </div>

    <div class="rules-section">
      <div class="rules-section-title">⚠️ Importante</div>
      <div style="font-size:13px;color:var(--text-m);line-height:1.7;">
        ✗ No podés cambiar estos pronósticos una vez confirmados<br>
        ✗ Si no los cargás antes del primer partido, perdés esos puntos<br>
        ✓ Son anónimos hasta que el torneo termine<br>
        ✓ Los puntos son independientes de las redoblones
      </div>
    </div>`;

  if (tab === 'faq') return `
    <div class="faq-item">
      <div class="faq-q">¿Cuándo se bloquean mis pronósticos?</div>
      <div class="faq-a">Exactamente al momento en que arranca el partido. El sistema usa el horario oficial del partido y cierra la ventana automáticamente.</div>
    </div>
    <div class="faq-item">
      <div class="faq-q">¿Puedo cambiar mi pronóstico antes de que empiece?</div>
      <div class="faq-a">Sí. Mientras el partido esté "próximo" podés entrar y modificar el marcador tantas veces como quieras. Solo el último que guardaste es el que cuenta.</div>
    </div>
    <div class="faq-item">
      <div class="faq-q">¿Cuándo puedo ver las apuestas de los demás?</div>
      <div class="faq-a">Solo cuando el partido ya arrancó (estado "en juego") o terminó. Antes del inicio solo ves las tendencias globales (% local / empate / visitante), pero no quién apostó qué.</div>
    </div>
    <div class="faq-item">
      <div class="faq-q">¿Puedo recuperar una redoblona que activé por error?</div>
      <div class="faq-a">Sí, podés quitarla mientras el partido no haya empezado. Una vez que arranca, la redoblona queda bloqueada junto con el pronóstico.</div>
    </div>
    <div class="faq-item">
      <div class="faq-q">¿Qué pasa si no aposté en un partido?</div>
      <div class="faq-a">Simplemente no sumás ni restás nada. No hay penalización por no apostar, pero perdés la oportunidad de sumar puntos.</div>
    </div>
    <div class="faq-item">
      <div class="faq-q">¿Cómo se calcula el ranking cuando hay partidos en vivo?</div>
      <div class="faq-a">El ranking muestra los puntos confirmados (partidos terminados) más los puntos provisorios del marcador actual en curso. Estos últimos pueden cambiar con cada gol.</div>
    </div>
    <div class="faq-item">
      <div class="faq-q">¿En qué casos la redoblona no sirve de nada?</div>
      <div class="faq-a">Si tu pronóstico es incorrecto (0 pts), la redoblona no cambia nada. Solo multiplica si ya ganaste algún punto.</div>
    </div>
    <div class="faq-item">
      <div class="faq-q">¿Qué significa "bonus diferencia de goles"?</div>
      <div class="faq-a">Si acertás el ganador Y la diferencia entre los goles es la misma que tu pronóstico, sumás +1 extra. Ej: apostás 3-1 y sale 2-0 → ambos ganan por 2 → 3+1 = 4 pts.</div>
    </div>`;

  return '';
}
</script>
</body>
</html>
