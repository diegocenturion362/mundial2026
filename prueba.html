<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ALBIPOLLA · Pronósticos [PRUEBA]</title>
<link rel="manifest" href="manifest.json?v=5">
<meta name="theme-color" content="#0e1a10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ALBIPOLLA">
<link rel="icon" type="image/png" sizes="192x192" href="albipolla-icon-192-v5.png">
<link rel="apple-touch-icon" href="albipolla-icon-512-v5.png">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=DM+Sans:wght@400;500&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0e1a10; --bg-card: #162419; --bg-el: #1e302a;
  --accent: #4ade80; --accent-dim: rgba(74,222,128,0.12);
  --gold: #f59e0b; --gold-dim: rgba(245,158,11,0.15);
  --silver: #94a3b8; --bronze: #c97d2e;
  --text: #ecfdf5; --text-m: #7a9e82; --text-d: #3d5c44;
  --border: rgba(74,222,128,0.1); --border-md: rgba(74,222,128,0.22);
  --danger: #f87171; --radius: 12px; --radius-s: 8px;
  --fd: 'Barlow Condensed', sans-serif; --fb: 'DM Sans', sans-serif;
}
html, body { height:100%; background:var(--bg); color:var(--text); font-family:var(--fb); font-size:15px; -webkit-font-smoothing:antialiased; }

/* ── PLAYER SELECT ── */
#player-select { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem 1.25rem; background:radial-gradient(ellipse at top, #1a3a20 0%, #0e1a10 65%); }
.logo-area { text-align:center; margin-bottom:2.5rem; }
.logo-ball { font-size:56px; display:block; margin-bottom:.5rem; animation: spin 8s linear infinite; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
.logo-title { font-family:var(--fd); font-size:40px; font-weight:700; letter-spacing:.06em; }
.logo-sub { font-size:13px; color:var(--text-m); margin-top:4px; }
.brand-logo{display:block;width:112px;height:112px;object-fit:cover;margin:0 auto .8rem;background:#fff;border-radius:24px;padding:0;box-shadow:0 10px 28px rgba(0,0,0,.25)}
.brand-title{font-family:var(--fd);font-size:30px;font-weight:800;letter-spacing:.06em}
.brand-logo.loading{width:104px;height:104px}
.sponsor-box{width:100%;max-width:360px;margin:2px auto 0;padding:14px 18px;background:linear-gradient(135deg,#ffffff 0%,#f0f7fc 100%);border-radius:14px;position:relative;overflow:hidden;box-shadow:0 0 0 1px rgba(14,80,146,.08),0 8px 24px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.8);display:flex;justify-content:center;align-items:center}
.sponsor-box::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top right,rgba(111,182,224,.18),transparent 60%),radial-gradient(ellipse at bottom left,rgba(14,80,146,.08),transparent 60%);pointer-events:none}
.ranking-sponsor{margin:0 0 12px}
.tecsul-logo{display:inline-flex;align-items:flex-end;font-family:'Nunito',sans-serif;font-weight:900;line-height:.9;letter-spacing:-.025em;position:relative;user-select:none;font-size:40px}
.tecsul-logo .tec{color:#6FB6E0}
.tecsul-logo .sul{color:#0E5092;position:relative}
.tecsul-logo .reg{font-size:.26em;vertical-align:super;color:#0E5092;font-weight:700;margin-left:2px;margin-bottom:.35em}
.tecsul-logo .sae{position:absolute;right:0;bottom:-.42em;font-size:.2em;color:#0E5092;font-weight:800;letter-spacing:.14em}
.select-card { width:100%; max-width:400px; background:var(--bg-card); border:.5px solid var(--border-md); border-radius:var(--radius); padding:1.5rem; }
.select-card h2 { font-family:var(--fd); font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--text-m); margin-bottom:1rem; }
.player-list { display:flex; flex-direction:column; gap:8px; margin-bottom:1.25rem; }
.player-btn { display:flex; align-items:center; gap:12px; padding:11px 14px; background:var(--bg-el); border:.5px solid var(--border); border-radius:var(--radius-s); cursor:pointer; width:100%; color:var(--text); font-family:var(--fb); font-size:15px; transition:all .15s; }
.player-btn:hover { border-color:var(--border-md); background:#233d2a; }
.player-btn .pts { margin-left:auto; font-family:var(--fd); font-size:18px; color:var(--accent); }
.divider { display:flex; align-items:center; gap:10px; margin:1rem 0; font-size:12px; color:var(--text-d); }
.divider::before,.divider::after { content:''; flex:1; height:.5px; background:var(--border); }
.new-player-form { display:flex; gap:8px; }

/* ── INPUTS / BUTTONS ── */
input[type=text],input[type=number],input[type=password],input[type=datetime-local],select {
  background:var(--bg-el); border:.5px solid var(--border-md); border-radius:var(--radius-s);
  color:var(--text); font-family:var(--fb); font-size:15px; padding:10px 14px; outline:none; transition:border-color .15s; width:100%; }
input:focus,select:focus { border-color:var(--accent); }
input::placeholder { color:var(--text-d); }
select { appearance:none; }
.btn { padding:10px 18px; border-radius:var(--radius-s); border:none; cursor:pointer; font-family:var(--fb); font-size:14px; font-weight:500; transition:all .15s; white-space:nowrap; }
.btn-primary { background:var(--accent); color:#071a0e; font-weight:600; }
.btn-primary:hover { opacity:.9; }
.btn-primary:active { transform:scale(.97); }
.btn-secondary { background:var(--bg-el); color:var(--text); border:.5px solid var(--border-md); }
.btn-secondary:hover { border-color:var(--accent); }
.btn-danger { background:rgba(248,113,113,.12); color:var(--danger); border:.5px solid rgba(248,113,113,.25); }
.btn-gold { background:var(--gold); color:#3a2000; font-weight:600; }

/* ── APP SHELL ── */
#app { display:none; flex-direction:column; min-height:100vh; padding-bottom:72px; }
.app-header { background:var(--bg-card); border-bottom:.5px solid var(--border); padding:10px 16px; display:flex; align-items:center; gap:10px; position:sticky; top:0; z-index:100; }
.header-logo { font-family:var(--fd); font-size:20px; font-weight:700; color:var(--accent); letter-spacing:.05em; }
.phase-pill { font-size:11px; color:var(--text-m); background:var(--accent-dim); padding:3px 9px; border-radius:20px; }
.header-player { display:flex; align-items:center; gap:8px; cursor:pointer; padding:5px 9px; border-radius:var(--radius-s); transition:background .15s; }
.header-player:hover { background:var(--accent-dim); }
.content { padding:16px; flex:1; max-width:520px; width:100%; margin:0 auto; }

/* Bottom nav */
.bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:520px; background:var(--bg-card); border-top:.5px solid var(--border); display:flex; z-index:100; padding-bottom:env(safe-area-inset-bottom); }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:9px 4px; cursor:pointer; color:var(--text-d); font-size:10px; gap:3px; background:none; border:none; font-family:var(--fb); transition:color .15s; }
.nav-item svg { width:21px; height:21px; stroke:currentColor; fill:none; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }
.nav-item.active { color:var(--accent); }

/* ── CARDS ── */
.card { background:var(--bg-card); border:.5px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:12px; }
.sec-title { font-family:var(--fd); font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--text-m); margin:1.25rem 0 .75rem; padding-bottom:7px; border-bottom:.5px solid var(--border); }
.sec-title:first-child { margin-top:0; }

/* ── MATCH CARD ── */
.match-card { background:var(--bg-card); border:.5px solid var(--border); border-radius:var(--radius); padding:14px 16px; margin-bottom:10px; transition:border-color .2s; }
.match-card.has-pred { border-color:rgba(74,222,128,.3); }
.match-card.closed { opacity:.72; }
.match-meta { display:flex; justify-content:space-between; font-size:11px; color:var(--text-m); margin-bottom:12px; }
.match-body { display:flex; align-items:center; gap:8px; }
.team-side { flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; }
.team-flag { line-height:1; display:flex; justify-content:center; }
.team-flag img.flag { width:36px; height:26px; border-radius:4px; border:.5px solid rgba(255,255,255,.1); object-fit:cover; display:block; }
.team-flag .flag-badge { width:36px; height:36px; border-radius:50%; background:var(--bg-el); display:flex; align-items:center; justify-content:center; font-family:var(--fd); font-size:11px; color:var(--text-m); font-weight:700; }
.team-name { font-size:12px; font-weight:500; text-align:center; }
.score-area { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.score-box { width:44px; height:44px; border:1.5px solid var(--border-md); border-radius:var(--radius-s); text-align:center; font-size:20px; font-weight:600; font-family:var(--fd); background:var(--bg-el); color:var(--text); transition:border-color .15s; padding:0; }
.score-box:focus { border-color:var(--accent); outline:none; }
.score-box:disabled { opacity:.45; cursor:not-allowed; }
.score-sep { font-family:var(--fd); font-size:22px; color:var(--text-d); user-select:none; }
.match-footer { margin-top:12px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
.wc-btn { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--text-m); cursor:pointer; padding:6px 10px; border-radius:var(--radius-s); border:.5px solid var(--border); background:none; transition:all .15s; font-family:var(--fb); }
.wc-btn:hover { border-color:var(--gold); color:var(--gold); }
.wc-btn.active { background:var(--gold-dim); border-color:var(--gold); color:var(--gold); }
.wc-btn:disabled { opacity:.3; cursor:not-allowed; }
.pen-selector { margin-top:10px; padding:9px 12px; background:rgba(74,222,128,.05); border:.5px solid rgba(74,222,128,.15); border-radius:var(--radius-s); }
.pen-label { font-size:11px; color:var(--text-m); margin-bottom:7px; font-weight:500; }
.pen-btns { display:flex; gap:6px; }
.pen-btn { flex:1; padding:7px 8px; border-radius:var(--radius-s); border:.5px solid var(--border-md); background:var(--bg-el); color:var(--text-m); font-family:var(--fb); font-size:12px; cursor:pointer; transition:all .15s; text-align:center; }
.pen-btn:hover { border-color:var(--accent); color:var(--text); }
.pen-btn.active { background:rgba(74,222,128,.15); border-color:var(--accent); color:var(--accent); font-weight:600; }
.pill { font-size:11px; padding:3px 10px; border-radius:20px; font-weight:500; }
.pill-exact { background:rgba(74,222,128,.15); color:var(--accent); }
.pill-partial { background:var(--gold-dim); color:var(--gold); }
.pill-wrong { background:rgba(248,113,113,.12); color:var(--danger); }
.pill-info { background:var(--accent-dim); color:var(--text-m); font-size:10px; }
.btn-save { font-size:13px; padding:7px 16px; border-radius:var(--radius-s); background:var(--accent); color:#071a0e; font-weight:600; border:none; cursor:pointer; font-family:var(--fb); transition:all .15s; }
.btn-save:hover { opacity:.9; }
.btn-save.saved { background:var(--bg-el); color:var(--text-m); border:.5px solid var(--border-md); cursor:default; }
.btn-save.editing { background:rgba(245,158,11,0.15); color:var(--gold); border:.5px solid rgba(245,158,11,0.4); }
.btn-save.editing:hover { background:rgba(245,158,11,0.25); }
.login-box { width:100%;max-width:360px;display:flex;flex-direction:column;gap:12px; }
.login-title { font-size:13px;color:var(--text-m);font-weight:500;margin-bottom:2px; }
.pin-row { display:flex;gap:8px; }
.pin-input { width:52px;height:52px;text-align:center;font-family:var(--fd);font-size:24px;font-weight:700;
  background:var(--bg-el);border:.5px solid var(--border-md);border-radius:10px;color:var(--text);
  -webkit-text-security:disc;letter-spacing:2px; }
.pin-input:focus { border-color:var(--accent);outline:none; }
.login-divider { display:flex;align-items:center;gap:10px;color:var(--text-d);font-size:11px; }
.login-divider::before,.login-divider::after { content:'';flex:1;height:.5px;background:var(--border); }
.player-chips { display:flex;flex-wrap:wrap;gap:7px; }
.player-chip { display:flex;align-items:center;gap:7px;padding:7px 12px;background:var(--bg-el);
  border:.5px solid var(--border-md);border-radius:20px;cursor:pointer;transition:all .15s; }
.player-chip:hover { border-color:var(--accent);background:var(--accent-dim); }
.player-chip span { font-size:13px;font-weight:500; }
.btn-wc{background:rgba(168,85,247,.15);color:#c084fc;border:.5px solid rgba(168,85,247,.3);border-radius:var(--radius-s);padding:6px 10px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.btn-wc.active{background:rgba(168,85,247,.35);border-color:#c084fc}
.btn-wc:hover{background:rgba(168,85,247,.25)}
.trends-box { margin-top:10px; padding:10px 12px; background:var(--bg-el); border-radius:8px; border:.5px solid var(--border-md); }
.trends-title { font-size:11px; color:var(--text-m); margin-bottom:8px; font-weight:500; }
.trend-row { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
.trend-label { font-size:11px; color:var(--text-m); width:54px; flex-shrink:0; }
.trend-bar-wrap { flex:1; height:5px; background:var(--bg-card); border-radius:3px; overflow:hidden; }
.trend-bar { height:100%; border-radius:3px; }
.trend-pct { font-size:11px; font-weight:700; width:30px; text-align:right; flex-shrink:0; font-family:var(--fd); }
.closed-lbl { font-size:11px; color:var(--danger); }

/* ── SPECIAL PRED CARD ── */
.special-card { background:linear-gradient(135deg,#1a3a20,#0e1a10); border:.5px solid rgba(245,158,11,.3); border-radius:var(--radius); padding:16px; margin-bottom:16px; }
.sp-header { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.sp-icon { font-size:28px; }
.sp-title { font-family:var(--fd); font-size:18px; font-weight:700; }
.sp-sub { font-size:12px; color:var(--gold); margin-top:2px; }
.form-label { font-size:12px; color:var(--text-m); margin-bottom:5px; font-weight:500; }
.form-group { display:flex; flex-direction:column; flex:1; }
.form-row { display:flex; gap:8px; }

/* ── RANKING ── */
.podium-wrap { display:flex; justify-content:center; align-items:flex-end; gap:10px; margin:1rem 0 1.5rem; height:145px; }
.podium-col { display:flex; flex-direction:column; align-items:center; gap:6px; }
.podium-ava { width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--fd); font-size:15px; font-weight:700; flex-shrink:0; }
.podium-block { display:flex; flex-direction:column; align-items:center; justify-content:flex-end; padding:8px 4px; width:92px; border-radius:8px 8px 0 0; }
.pb1 { height:95px; background:rgba(245,158,11,.18); border:.5px solid rgba(245,158,11,.4); }
.pb2 { height:68px; background:rgba(148,163,184,.12); border:.5px solid rgba(148,163,184,.3); }
.pb3 { height:52px; background:rgba(201,125,46,.12); border:.5px solid rgba(201,125,46,.3); }
.podium-pts { font-family:var(--fd); font-size:16px; font-weight:700; }
.podium-name { font-size:11px; color:var(--text-m); text-align:center; max-width:92px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.rank-row { display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:.5px solid var(--border); }
.rank-row:last-child { border-bottom:none; }
.rank-row.me { background:var(--accent-dim); margin:0 -16px; padding:11px 16px; }
.rank-num { font-family:var(--fd); font-size:16px; font-weight:600; color:var(--text-d); width:22px; text-align:center; flex-shrink:0; }
.rank-info { flex:1; min-width:0; }
.rank-name { font-weight:500; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.rank-stats { font-size:11px; color:var(--text-m); margin-top:1px; }
.rank-pts { font-family:var(--fd); font-size:24px; font-weight:700; color:var(--accent); flex-shrink:0; }
.streak-badge { font-size:10px; padding:2px 7px; border-radius:20px; background:var(--gold-dim); color:var(--gold); font-weight:500; flex-shrink:0; }

/* ── ACHIEVEMENTS ── */
.ach-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.ach-card { background:var(--bg-card); border:.5px solid var(--border); border-radius:var(--radius); padding:14px 12px; text-align:center; transition:all .2s; }
.ach-card.unlocked { border-color:rgba(245,158,11,.4); background:linear-gradient(135deg,#1e2a10,#162419); }
.ach-card.locked { opacity:.3; filter:grayscale(.4); }
.ach-icon { font-size:30px; margin-bottom:6px; }
.ach-title { font-size:13px; font-weight:500; }
.ach-desc { font-size:11px; color:var(--text-m); margin-top:3px; }
.ach-status { font-size:10px; margin-top:5px; }

/* ── ADMIN ── */
.admin-section { margin-bottom:1.75rem; }
.result-row { display:flex; align-items:center; gap:10px; padding:11px 14px; background:var(--bg-el); border-radius:var(--radius-s); border:.5px solid var(--border); margin-bottom:8px; flex-wrap:wrap; }
.result-match-info { flex:1; font-size:13px; min-width:0; }
.res-box { width:42px; height:40px; border:1.5px solid var(--border-md); border-radius:var(--radius-s); text-align:center; font-size:18px; font-weight:600; font-family:var(--fd); background:var(--bg-card); color:var(--text); padding:0; }
.result-row .flag { width:22px; height:16px; border-radius:3px; border:.5px solid rgba(255,255,255,.1); object-fit:cover; vertical-align:middle; }
.result-row .flag-badge { display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:50%; background:var(--bg-card); font-family:var(--fd); font-size:9px; color:var(--text-m); font-weight:700; vertical-align:middle; }

/* ── FIFA STATUS STRIP ── */
.fifa-strip { display:flex; align-items:center; justify-content:space-between; padding:8px 14px; background:var(--bg-el); border:.5px solid var(--border); border-radius:var(--radius-s); margin-bottom:12px; font-size:12px; color:var(--text-m); gap:10px; }
.fifa-strip button { font-size:11px; padding:4px 10px; border-radius:var(--radius-s); background:var(--accent-dim); color:var(--accent); border:.5px solid var(--border-md); cursor:pointer; font-family:var(--fb); white-space:nowrap; }
.fifa-strip button:disabled { opacity:.4; cursor:not-allowed; }

/* ── TOAST ── */
.toast { position:fixed; bottom:82px; left:50%; transform:translateX(-50%) translateY(16px); background:var(--bg-el); border:.5px solid var(--border-md); color:var(--text); padding:9px 18px; border-radius:20px; font-size:13px; font-weight:500; opacity:0; transition:all .28s; white-space:nowrap; z-index:999; pointer-events:none; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.ok { border-color:rgba(74,222,128,.4); color:var(--accent); }
.toast.err { border-color:rgba(248,113,113,.35); color:var(--danger); }

/* ── EMPTY ── */
.empty { text-align:center; padding:3rem 1rem; color:var(--text-m); }
.empty-icon { font-size:40px; margin-bottom:.75rem; }

/* ── AVATAR helper ── */
.ava { border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--fd); font-weight:700; flex-shrink:0; }

/* ── LOADING INDICATOR ── */
.loading-row { text-align:center; padding:2rem 1rem; color:var(--text-m); font-size:13px; }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
.loading-dot { animation:pulse 1.4s ease-in-out infinite; display:inline-block; }
.loading-dot:nth-child(2){animation-delay:.2s} .loading-dot:nth-child(3){animation-delay:.4s}

/* ── EXTRA: Live, Groups, Chat, Profile, Achievements ── */
.btn-sm{padding:6px 12px;font-size:12px}
.live-badge{display:inline-flex;align-items:center;gap:4px;background:var(--live-dim);color:var(--live);border:.5px solid rgba(239,68,68,.3);border-radius:20px;font-size:11px;font-weight:700;padding:2px 8px;letter-spacing:.04em}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--live);animation:lpulse 1s ease-in-out infinite;flex-shrink:0}
@keyframes lpulse{0%,100%{opacity:1}50%{opacity:.3}}
.bet-pts{font-family:var(--fd);font-size:13px;font-weight:700;flex-shrink:0;min-width:58px;text-align:right}
.bet-pts.pts-toggle{appearance:none;border:0;background:transparent;padding:0;cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px}
.bet-pts.exact{color:var(--accent)}.bet-pts.partial{color:var(--gold)}.bet-pts.wrong{color:var(--danger)}.bet-pts.pending{color:var(--text-m)}

      if (keys.length && keys.every(k2 => !isNaN(parseInt(k2)))) {
        return keys.map(k2 => v[k2]);
      }
    }
    return v;
  },
  set(k, v) {
    _cache[k] = v;
    clearTimeout(_writeTimers[k]);
    _writeTimers[k] = setTimeout(() => {
      if (_fbDatabase) {
        _fbDatabase.ref(FB_ROOT + '/' + k).set(v).catch(err => console.warn('FB write error:', k, err));
      }
    }, 300);
  },
  getPlayers:      () => DB.get('players', []),
  getPredictions:  () => DB.get('predictions', []),
  getWildcards:    () => DB.get('wildcards', {}),
  getSpecial:      () => DB.get('special', []),
  savePlayers:     v  => DB.set('players', v),
  savePredictions: v  => DB.set('predictions', v),
  saveWildcards:   v  => DB.set('wildcards', v),
  saveSpecial:     v  => DB.set('special', v),
  getSnapshots:    ()  => DB.get('rank_snaps', []),
  saveSnapshots:   v  => DB.set('rank_snaps', v),
  getChat:    (matchId) => DB.get('chat_' + matchId, []),
  saveChat:   (matchId, v) => DB.set('chat_' + matchId, v),
};

function savePlayersMerged(nextPlayers) {
  const arr = Array.isArray(nextPlayers) ? nextPlayers.filter(Boolean) : [];
  _cache.players = arr;

  if (!_fbDatabase) {
    DB.set('players', arr);
    return;
  }

  _fbDatabase.ref(FB_ROOT + '/players').transaction(current => {
    const remote = normalizeFirebaseValue(current);
    const merged = new Map();
    if (Array.isArray(remote)) {
      remote.filter(Boolean).forEach(p => { if (p.id) merged.set(String(p.id), p); });
    }
    arr.forEach(p => { if (p && p.id) merged.set(String(p.id), p); });
    return Array.from(merged.values());
  }).catch(err => console.warn('FB players merge error:', err));
}

// ── Listeners de tiempo real ──
const REALTIME_KEYS = ['players', 'predictions', 'wildcards', 'special', 'meta', 'rank_snaps'];

function normalizeFirebaseValue(val) {
  // Firebase convierte arrays a objetos {0:..., 1:...} — los revertimos
  if (val && typeof val === 'object' && !Array.isArray(val)) {
    const keys = Object.keys(val);
    const isArrayLike = keys.every(k => !isNaN(parseInt(k)));
    if (isArrayLike) return keys.map(k => val[k]);
  }
  return val;
}

function setupFirebaseListeners(db) {
  REALTIME_KEYS.forEach(key => {
    db.ref(FB_ROOT + '/' + key).on('value', snap => {
      const raw = snap.val();
      if (raw === null) {
        if (key === 'players') { _cache.players = []; _playersReady = true; }
        return;
      }
      const val = normalizeFirebaseValue(raw);
      if (key === 'players') _playersReady = true;
      const prev = JSON.stringify(_cache[key]);
      const next = JSON.stringify(val);
      if (prev === next) return;
      _cache[key] = val;
      if (currentPlayer && !document.activeElement?.matches('input,textarea,select')) {
        renderView(currentView);
      }
    });
  });

  // ── Listener en tiempo real para partidos (estado/marcador cambiado por el admin) ──
  db.ref(FB_ROOT + '/fifa_matches').on('value', snap => {
    const raw = snap.val();
    if (!raw) return;
    const val = normalizeFirebaseValue(raw);
    if (!Array.isArray(val) || !val.length) return;
    const prev = JSON.stringify(matches);
    const next = JSON.stringify(val);
    if (prev === next) return;          // sin cambios, no re-renderizar
    matches = val;
    // Guardar solo en localStorage (evitar loop de escritura Firebase→listener→Firebase)
    try { localStorage.setItem(MATCH_CACHE_KEY, JSON.stringify(matches)); } catch(e) {}
    if (currentPlayer && !document.activeElement?.matches('input,textarea,select')) {
      renderView(currentView);
    }
  });
}

// ── Caché de partidos FIFA en Firebase ──
// Los partidos los sigue trayendo cada cliente desde la API de FIFA,
// pero también se guardan en Firebase para compartir entre dispositivos.
function loadCachedMatchesFromFirebase(callback) {
  if (_fbDatabase) {
    const timeout = new Promise(resolve => setTimeout(() => resolve(null), 3000));
    Promise.race([_fbDatabase.ref(FB_ROOT + '/fifa_matches').get(), timeout])
      .then(snap => {
        if (!snap) return callback([]);
        const val = snap.val();
        callback(val && Array.isArray(val) && val.length ? val : []);
      }).catch(() => callback([]));
  } else {
    callback([]);
  }
}

function saveCachedMatchesToFirebase(arr) {
  if (_fbDatabase && arr && arr.length) {
    _fbDatabase.ref(FB_ROOT + '/fifa_matches').set(arr).catch(() => {});
  }
}

// ── Inicialización Firebase ──
async function initFirebase() {
  firebase.initializeApp(FIREBASE_CONFIG);
  const db = firebase.database();
  _fbDatabase = db;

  const timeout = new Promise((_, reject) =>
    setTimeout(() => reject(new Error('Firebase timeout (8s)')), 8000)
  );

  let snap;
  try {
    snap = await Promise.race([db.ref(FB_ROOT).get(), timeout]);
  } catch(e) {
    console.warn('Firebase read error:', e.message);
    // Continuar sin datos remotos — se usará caché local
    setupFirebaseListeners(db);
    return;
  }

  const data = snap.val() || {};
  Object.entries(data).forEach(([k, v]) => { _cache[k] = v; });
  if (!Object.prototype.hasOwnProperty.call(data, 'players')) _cache.players = [];
  _playersReady = true;

  setupFirebaseListeners(db);
}

// Helpers para parsear campos de texto de FIFA (arrays con Description)
function localizedText(arr, fb = '') {
  return arr && arr[0] && arr[0].Description ? arr[0].Description : fb;
}
function teamName(team, placeholder) {
  if (!team) return placeholder || 'Por definir';
  return localizedText(team.TeamName, '') || team.ShortClubName || team.Abbreviation || placeholder || 'Por definir';
}
function countryCode(team) {
  if (!team) return '';
  return String(team.IdCountry || team.Abbreviation || '').toUpperCase().slice(0,3);
}
function mapFifaStatus(statusCode) {
  if ([11,12,13].includes(statusCode)) return 'finished';
  if ([3,4,5,6,7,8,9,10].includes(statusCode)) return 'closed';
  if ([14,15].includes(statusCode)) return 'upcoming';
  return 'upcoming';
}
function mapPhase(match) {
  const g = localizedText(match.GroupName, '').toLowerCase();
  if (g.match(/grupo\s+[a-l]/i) || g.match(/group\s+[a-l]/i)) return 'grupos';
  const s = (localizedText(match.StageName, '') || '').toLowerCase();
  if (s.includes('primera') || s.includes('first stage') || s.includes('fase de grupo')) return 'grupos';
  if (s.includes('32') || s.includes('treinta')) return 'r32';
  if (s.includes('16') || s.includes('octavo') || s.includes('round of 16')) return 'r16';
  if (s.includes('cuarto') || s.includes('quarter')) return 'qf';
  if (s.includes('semi')) return 'sf';
  if (s.includes('tercer') || s.includes('third')) return 'sf';
  if (s.includes('final')) return 'final';
  if (g.startsWith('grupo') || g.startsWith('group')) return 'grupos';
  return 'grupos';
}
function normalizeFifaMatch(m) {
  const group = localizedText(m.GroupName, '');
  // Extract letter after "Grupo " for display
  const groupLetter = group.match(/[A-L]$/i) ? group.match(/[A-L]$/i)[0].toUpperCase() : group || '?';
  return {
    id:        String(m.IdMatch),
    matchNumber: m.MatchNumber || null,
    homeTeam:  teamName(m.Home, m.PlaceHolderA),
    awayTeam:  teamName(m.Away, m.PlaceHolderB),
    homeCode:  countryCode(m.Home),
    awayCode:  countryCode(m.Away),
    group:     groupLetter,
    phase:     mapPhase(m),
    date:      m.Date,
    kickoff:   m.Date,
    status:    mapFifaStatus(m.MatchStatus),
    homeScore: Number.isInteger(m.HomeTeamScore) ? m.HomeTeamScore : null,
    awayScore: Number.isInteger(m.AwayTeamScore) ? m.AwayTeamScore : null,
    venue:     localizedText(m.Stadium && m.Stadium.Name, ''),
    city:      localizedText(m.Stadium && m.Stadium.CityName, ''),
  };
}

async function loadFifaMatches({ silent = false } = {}) {
  if (fifaLoading) return;
  fifaLoading = true;
  updateFifaStrip('Actualizando...', true);
  if (!silent) toast('Actualizando partidos desde FIFA…');

  try {
    const res  = await fetch(FIFA_URL, { cache:'no-store' });
    if (!res.ok) throw new Error(`FIFA: ${res.status}`);
    const data = await res.json();

    // Snapshot de qué partidos estaban finalizados ANTES de actualizar
    const prevFinished = new Set(matches.filter(m => m.status === 'finished').map(m => m.id));

    // PRUEBA: preservar SIEMPRE el estado y marcador fijado manualmente por el admin
    const existing = Object.fromEntries(matches.map(m => [m.id, m]));
    const fresh = (data.Results || [])
      .map(normalizeFifaMatch)
      .sort((a,b) => new Date(a.kickoff) - new Date(b.kickoff));

    for (const m of fresh) {
      const ex = existing[m.id];
      if (ex) {
        // Partido ya conocido: tomar fixture de FIFA pero respetar estado/marcador manual
        m.status    = ex.status;
        m.homeScore = ex.homeScore;
        m.awayScore = ex.awayScore;
        if (ex.penWinner) m.penWinner = ex.penWinner;
      } else {
        // Partido nuevo que llega de FIFA: siempre empieza como pending
        m.status    = 'pending';
        m.homeScore = null;
        m.awayScore = null;
      }
    }

    matches = fresh;
    saveCachedMatches(matches);

    // Detectar partidos nuevamente finalizados → guardar snapshot automático
    const newlyFinished = matches.filter(m => m.status === 'finished' && !prevFinished.has(m.id));
    if (newlyFinished.length > 0) {
      newlyFinished.forEach(m => {
        const label = `${m.homeTeam} ${m.homeScore}-${m.awayScore} ${m.awayTeam}`;
        saveRankSnapshot(m.id, label);
      });
      if (silent) toast(`✓ ${newlyFinished.length} resultado${newlyFinished.length>1?'s':''} nuevo${newlyFinished.length>1?'s':''} de FIFA`, 'ok');
    }

    const hasLive = matches.some(m => m.status === 'live');
    const now = new Date().toLocaleTimeString('es-PY', {hour:'2-digit', minute:'2-digit'});
    fifaSource = `FIFA · ${matches.length} partidos · ${now}`;
    if (!silent) toast(`✓ ${matches.length} partidos cargados`, 'ok');
    updateFifaStrip(fifaSource, false);
    scheduleNextRefresh(hasLive);
    if (currentPlayer) renderView(currentView);
  } catch(err) {
    fifaSource = matches.length ? `Caché · ${matches.length} partidos` : 'FIFA no disponible';
    updateFifaStrip(fifaSource, false);
    if (!silent) toast('No se pudo conectar con FIFA', 'err');
    scheduleNextRefresh(false);
  } finally {
    fifaLoading = false;
  }
}

// ╔══════════════════════════════════════════════════╗
// ║  SCORING ENGINE                                   ║
// ╚══════════════════════════════════════════════════╝
function scorePlayer(playerId) {
  const finished = matches.filter(m => m.status === 'finished');
  const preds    = DB.getPredictions().filter(p => p.playerId === playerId);
  const wc       = DB.getWildcards()[playerId] || {};
  const special  = DB.getSpecial().find(s => s.playerId === playerId);

  let pts=0, exact=0, partial=0, maxStreak=0, curStreak=0, wildcardWin=false, totalPreds=0;

  for (const m of finished) {
    const p = preds.find(x => x.matchId === m.id);
    if (!p) { curStreak=0; continue; }
    totalPreds++;
    const isWC = wc[m.phase] === m.id;
    let mp = 0;
    if (p.homeScore === m.homeScore && p.awayScore === m.awayScore) {
      mp=3; exact++; curStreak++;
    } else if (outcome(p.homeScore,p.awayScore) === outcome(m.homeScore,m.awayScore)) {
      mp=1; partial++; curStreak++;
    } else { curStreak=0; }
    if (isWC && mp>0) { mp*=2; wildcardWin=true; }
    maxStreak = Math.max(maxStreak, curStreak);
    pts += mp;
  }

  // Pronósticos especiales
  const meta = DB.get('meta', {});
  let championOk = false;
  if (special?.champion && meta.champion) {
    if (special.champion.trim().toLowerCase() === meta.champion.trim().toLowerCase()) {
      pts += 15; championOk = true;
    }
  }
  if (special?.topScorer && meta.topScorer) {
    if (special.topScorer.trim().toLowerCase() === meta.topScorer.trim().toLowerCase()) pts += 10;
  }

  return { pts, exact, partial, maxStreak, curStreak, wildcardWin, totalPreds, championOk };
}

function allScores() {
  return DB.getPlayers()
    .map(p => ({ ...p, ...scorePlayer(p.id) }))
    .sort((a,b) => b.pts - a.pts);
}

  if (pin.length !== 4 || !/^\d{4}$/.test(pin)) { toast('PIN de 4 dígitos numéricos','err'); return; }

  const pinHash = hashPin(pin);
  const players = DB.getPlayers();
  const existing = players.find(p => p.name.toLowerCase() === name.toLowerCase());

  if (existing) {
    // Jugador existente — verificar PIN
    if (!existing.pinHash) {
      // Primera vez que usa PIN — lo asignamos
      existing.pinHash = pinHash;
      savePlayersMerged(players);
      const rem0 = document.getElementById('ln-remember')?.checked;
      doLogin(existing, rem0);
    } else if (existing.pinHash === pinHash) {
      const rem1 = document.getElementById('ln-remember')?.checked;
      doLogin(existing, rem1);
    } else {
      toast('PIN incorrecto 🔒','err');
    }
  } else {
    // Jugador nuevo
    const np = { id:genId(), name, colorIdx:players.length, pinHash, joinedAt:Date.now() };
    players.push(np);
    savePlayersMerged(players);
    toast('¡Bienvenido/a ' + name + '! 🎉','ok');
    const rem2 = document.getElementById('ln-remember')?.checked;
    doLogin(np, rem2);
  }
}

// ── Preservar inputs no guardados al re-renderizar Pronósticos ──
function capturePredState() {
  const state = { scores: {}, penWinners: {}, specials: {} };
  // Captura score boxes con valores no guardados
  document.querySelectorAll('input.score-box').forEach(inp => {
    if (inp.value !== '' && !inp.disabled) state.scores[inp.id] = inp.value;
  });
  // Captura selección de penales activa
  document.querySelectorAll('button.pen-btn.active').forEach(btn => {
    const isHome = btn.id.startsWith('pen-h-');
    const matchId = btn.id.slice(6); // quita 'pen-h-' o 'pen-a-'
    state.penWinners[matchId] = isHome ? 'home' : 'away';
  });
  // Captura inputs especiales (campeón, subcampeón, etc.) si están abiertos
  ['sp-champ','sp-sub','sp-third','sp-scorer'].forEach(id => {
    const el = document.getElementById(id);
    if (el && !el.disabled && el.value.trim() !== '') state.specials[id] = el.value;
  });
  return state;
}

function restorePredState(state) {
  // Restaura scores y recolecta matchIds afectados
  const restoredIds = new Set();
  Object.entries(state.scores).forEach(([id, val]) => {
    const el = document.getElementById(id);
    if (el && !el.disabled) { el.value = val; restoredIds.add(id.slice(2)); }
  });
  // Actualiza visibilidad del selector de penales para cada partido restaurado
  restoredIds.forEach(matchId => checkPenSelector(matchId));
  // Restaura selección de penales
  Object.entries(state.penWinners).forEach(([matchId, side]) => {
    setPenWinner(matchId, side === 'home');
  });
  // Restaura inputs especiales
  Object.entries(state.specials).forEach(([id, val]) => {
    const el = document.getElementById(id);
    if (el && !el.disabled) el.value = val;
  });
}

function renderView(v) {
  const c = document.getElementById('main-content');
  if (v === 'predictions') {
    const saved = capturePredState();
    renderPredictions(c);
    restorePredState(saved);
  }
  else if (v === 'ranking')     renderRanking(c);
  else if (v === 'grupos')      renderGrupos(c);
  else if (v === 'perfil')      renderPerfil(c);
  else if (v === 'misapuestas') renderMisApuestas(c);
  else if (v === 'history')     renderHistory(c);
  else if (v === 'logros')      renderLogros(c);
  else if (v === 'admin')       renderAdmin(c);
}

function calcRiskBonus(pred, hScore, aScore, matchId, allPredictions) {
  if (!pred || hScore===null) return 0;
  const base = calcPtsBase(pred, hScore, aScore);
  if (base === 0) return 0;
  const onMatch = allPredictions.filter(p=>p.matchId===matchId);
  const total = onMatch.length;
  if (total < 4) return 0;
  const myOutcome = outcome(pred.homeScore, pred.awayScore);
  const sameOutcome = onMatch.filter(p=>outcome(p.homeScore,p.awayScore)===myOutcome).length;
  const pct = sameOutcome / total;
  if (pct < 0.15) return 3;
  if (pct < 0.25) return 2;
  return 0;
}

function calcPtsBase(pred, hScore, aScore) {
  if (!pred || hScore===null || aScore===null) return 0;
  const isExact  = pred.homeScore===hScore && pred.awayScore===aScore;
  const isWinner = outcome(pred.homeScore,pred.awayScore)===outcome(hScore,aScore);
  const isGdOk   = (pred.homeScore-pred.awayScore)===(hScore-aScore);
  if (isExact) return 5;
  if (isWinner) return isGdOk ? 4 : 3;
  return 0;
}

function calcPts(pred, hScore, aScore, isWC, phase, penWinner) {
  const raw = calcPtsBase(pred, hScore, aScore);
  if (raw === 0) return 0;
  const mult = PHASE_MULT[phase] || 1;
  let pts = raw * mult;
  if (penWinner && pred.penWinner && pred.penWinner === penWinner) pts += (PEN_BONUS_PTS[phase] || 0);
  if (isWC) pts *= 2;
  return pts;
}

function isWCUsed(wcData, match) {
  if (!wcData) return false;
  if (match.phase==='grupos') {
    const grp = wcData.grupos || {};
    return grp[match.group] === match.id;
  }
  const used = wcData[match.phase];
  return Array.isArray(used) ? used.includes(match.id) : used===match.id;
}

function wcRemaining(wcData, phase, groupLetter) {
  const quota = WC_QUOTA[phase] || 0;
  if (phase==='grupos') {
    return (wcData.grupos||{})[groupLetter] ? 0 : 1;
  }
  const used = wcData[phase];
  if (!used) return quota;
  const usedCount = Array.isArray(used) ? used.length : 1;
  return Math.max(0, quota - usedCount);
}

function calcFunStats(playerId, allPredictions) {
  // Solo considerar predicciones de jugadores activos
  const playerIds = new Set(DB.getPlayers().map(p=>p.id));
  const activePreds = allPredictions.filter(p=>playerIds.has(p.playerId));
  const myPreds = activePreds.filter(p=>p.playerId===playerId);
  const finished = matches.filter(m=>m.status==='finished');
  let soloSurprise=0, conservador=0, penalesOk=0, plenoGrupo=0;
  const CONSERVATIVE = new Set(['1-0','2-1','1-1','0-0','2-0']);
  for (const m of finished) {
    const myP = myPreds.find(x=>x.matchId===m.id);
    if (!myP) continue;
    const scKey = myP.homeScore+'-'+myP.awayScore;
    if (CONSERVATIVE.has(scKey)) conservador++;
    if (calcPtsBase(myP,m.homeScore,m.awayScore)>=3) {
      const allOnMatch = allPredictions.filter(x=>x.matchId===m.id);
      const sameOutcome = allOnMatch.filter(x=>outcome(x.homeScore,x.awayScore)===outcome(m.homeScore,m.awayScore));
      if (sameOutcome.length===1) soloSurprise++;
    }
    if (m.penWinner && myP.penWinner && myP.penWinner===m.penWinner) penalesOk++;
  }
  const byDay = {};
  for (const m of finished.filter(x=>x.phase==='grupos')) {
    const day = new Date(m.kickoff||m.date).toDateString();
    (byDay[day]=byDay[day]||[]).push(m);
  }
  for (const [day, dayMatches] of Object.entries(byDay)) {
    if (dayMatches.length < 2) continue;
    const allHit = dayMatches.every(m=>{
      const p=myPreds.find(x=>x.matchId===m.id);
      return p && outcome(p.homeScore,p.awayScore)===outcome(m.homeScore,m.awayScore);
    });
    if (allHit) plenoGrupo++;
  }
  return {soloSurprise, conservador, penalesOk, plenoGrupo};
}

function scorePlayer(playerId) {
  const allPredictions = DB.getPredictions();
  const preds    = allPredictions.filter(p=>p.playerId===playerId);
  const wcData   = DB.getWildcards()[playerId]||{};
  const finished = matches.filter(m=>m.status==='finished');
  const live     = matches.filter(m=>m.status==='live');
  let confirmedPts=0, provisionalPts=0;
  let exact=0, partial=0, gdBonus=0, maxStreak=0, curStreak=0;
  let wildcardWin=false, totalPreds=0;
  const activePreds = activePredictions();
  for (const m of finished) {
    const p = preds.find(x=>x.matchId===m.id);
    if (!p) { curStreak=0; continue; }
    totalPreds++;
    const isWC   = isWCUsed(wcData, m);
    const rawBase = calcPtsBase(p, m.homeScore, m.awayScore);
    const mult   = PHASE_MULT[m.phase] || 1;
    let mp = rawBase * mult;
    if (m.penWinner && p.penWinner && p.penWinner===m.penWinner) mp += (PEN_BONUS_PTS[m.phase]||0);
    if (isWC && mp>0) { mp*=2; wildcardWin=true; }
    const risk  = rawBase>0 ? calcRiskBonus(p, m.homeScore, m.awayScore, m.id, activePreds) : 0;
    let total = mp + risk;
    if (rawBase>0 && total>0) {
      const onMatch = activePreds.filter(x=>x.matchId===m.id);
      const soloScorer = onMatch.filter(x=>calcPtsBase(x,m.homeScore,m.awayScore)>0).length===1;
      if (soloScorer) total*=2;
    }
    if (rawBase===5) { exact++; curStreak++; }
    else if (rawBase>=3) { partial++; curStreak++; }
    else { curStreak=0; }
    if (rawBase===4) gdBonus++;
    maxStreak = Math.max(maxStreak, curStreak);
    confirmedPts += total;
  }
  for (const m of live) {
    const p = preds.find(x=>x.matchId===m.id);
    if (!p||m.homeScore===null) continue;
    const isWC = isWCUsed(wcData, m);
    provisionalPts += calcPts(p, m.homeScore, m.awayScore, isWC, m.phase, m.penWinner);
  }
  const meta = DB.get('meta',{});
  let championOk=false;
  const special = DB.getSpecial().find(s=>s.playerId===playerId);
  if (special?.champion && meta.champion &&
      special.champion.trim().toLowerCase()===meta.champion.trim().toLowerCase()) {
    confirmedPts+=15; championOk=true;
  }
  if (special?.subCampeon && meta.subCampeon &&
      special.subCampeon.trim().toLowerCase()===meta.subCampeon.trim().toLowerCase()) {
    confirmedPts+=8;
  }
  if (special?.tercerPuesto && meta.tercerPuesto &&
      special.tercerPuesto.trim().toLowerCase()===meta.tercerPuesto.trim().toLowerCase()) {
    confirmedPts+=5;
  }
  if (special?.topScorer && meta.topScorer &&
      special.topScorer.trim().toLowerCase()===meta.topScorer.trim().toLowerCase()) {
    confirmedPts+=10;
  }
  const fun = calcFunStats(playerId, allPredictions);
  const pts = confirmedPts + provisionalPts;
  return {pts, confirmedPts, provisionalPts, exact, partial, gdBonus,
          maxStreak, curStreak, wildcardWin, totalPreds, championOk, ...fun};
}

function allScores() {
  return DB.getPlayers()
    .map(p=>({...p,...scorePlayer(p.id)}))
    .sort((a,b)=>b.pts-a.pts || b.exact-a.exact);
}

function provPtsForMatch(playerId, matchId) {
  const m = matches.find(x=>x.id===matchId);
  if (!m||m.homeScore===null||m.awayScore===null) return 0;
  const p = DB.getPredictions().find(x=>x.playerId===playerId&&x.matchId===matchId);
  if (!p) return null;
  const wcData = DB.getWildcards()[playerId]||{};
  const isWC = isWCUsed(wcData, m);
  let pts = calcPts(p, m.homeScore, m.awayScore, isWC, m.phase, m.penWinner);
  if (pts > 0) {
    const onMatch = activePredictions().filter(x=>x.matchId===matchId);
    const soloScorer = onMatch.filter(x=>calcPtsBase(x,m.homeScore,m.awayScore)>0).length===1;
    if (soloScorer) pts*=2;
  }
  return pts;
}

// Puntos que ganó un jugador en un partido específico (para ranking por jornada)
function ptsEarnedInMatch(playerId, matchId) {
  const m = matches.find(x=>x.id===matchId);
  if (!m || m.status!=='finished') return 0;
  const p = DB.getPredictions().find(x=>x.playerId===playerId&&x.matchId===matchId);
  if (!p) return 0;
  const wcData = DB.getWildcards()[playerId]||{};
  const isWC = isWCUsed(wcData, m);
  const pts = calcPts(p, m.homeScore, m.awayScore, isWC, m.phase, m.penWinner);
  const risk = pts>0 ? calcRiskBonus(p, m.homeScore, m.awayScore, m.id, activePredictions()) : 0;
  let total = pts + risk;
  if (total > 0) {
    const allActive = activePredictions();
    const onMatch = allActive.filter(x=>x.matchId===matchId);
    const soloScorer = onMatch.filter(x=>calcPtsBase(x,m.homeScore,m.awayScore)>0).length===1;
    if (soloScorer) total *= 2;
  }
  return total;
}

function pointsBreakdownForMatch(playerId, m, pred) {
  if (!pred) return null;
  if (!m || m.homeScore===null || m.awayScore===null) {
    return {total:null, rows:[{label:'Estado', value:'Esperando resultado'}]};
  }

  const wcData = DB.getWildcards()[playerId] || {};
  const isWC = isWCUsed(wcData, m);
  const rawBase = calcPtsBase(pred, m.homeScore, m.awayScore);
  const rows = [];

  if (rawBase === 5) rows.push({label:'Acierto', value:'+5 exacto'});
  else if (rawBase === 4) rows.push({label:'Acierto', value:'+4 ganador y diferencia'});
  else if (rawBase === 3) rows.push({label:'Acierto', value:'+3 ganador'});
  else rows.push({label:'Acierto', value:'+0'});

  const mult = PHASE_MULT[m.phase] || 1;
  let subtotal = rawBase * mult;
  const phaseName = PHASES[m.phase] || m.phase || 'fase';
  if (rawBase > 0) {
    rows.push({label:'Fase', value:rawBase + ' × ' + mult + ' (' + phaseName + ') = +' + subtotal});
  }

  const penBonus = (m.penWinner && pred.penWinner && pred.penWinner === m.penWinner) ? (PEN_BONUS_PTS[m.phase] || 0) : 0;
  if (penBonus > 0) {
    subtotal += penBonus;
    rows.push({label:'Penales', value:'+' + penBonus});
  }

  if (isWC && subtotal > 0) {
    const before = subtotal;
    subtotal *= 2;
    rows.push({label:'Redoblona', value:before + ' × 2 = +' + subtotal});
  }

  const risk = (m.status === 'finished' && rawBase > 0)
    ? calcRiskBonus(pred, m.homeScore, m.awayScore, m.id, activePredictions())
    : 0;
  let total = subtotal + risk;
  if (risk > 0) rows.push({label:'Bonus riesgo', value:'+' + risk});

  if (rawBase > 0 && total > 0) {
    const onMatch = activePredictions().filter(x=>x.matchId===m.id);
    const soloScorer = onMatch.filter(x=>calcPtsBase(x,m.homeScore,m.awayScore)>0).length===1;
    if (soloScorer) {
      const before = total;
      total *= 2;
      rows.push({label:'Único que sumó', value:before + ' × 2 = +' + total});
    }
  }

  if (m.status === 'live') rows.push({label:'Estado', value:'Provisorio'});
  rows.push({label:'Total', value:total > 0 ? '+' + total + ' pts' : '0 pts', total:true});
  return {total, rows};
}

function renderPointsBreakdown(id, breakdown) {
  if (!breakdown) return '';
  const rows = breakdown.rows.map(r =>
    '<div class="points-breakdown-row' + (r.total ? ' points-breakdown-total' : '') + '">' +
      '<span>' + escapeHtml(String(r.label)) + '</span>' +
      '<span>' + escapeHtml(String(r.value)) + '</span>' +
    '</div>'
  ).join('');
  return '<div class="points-breakdown" id="' + id + '">' + rows + '</div>';
}

function betResult(pred, hScore, aScore) {
  if (hScore===null||aScore===null) return 'pending';
  if (pred.homeScore===hScore && pred.awayScore===aScore) return 'exact';
  if (outcome(pred.homeScore,pred.awayScore)===outcome(hScore,aScore)) return 'partial';
  return 'wrong';
}

function ptsLabel(pts, res, isWC) {
  if (pts===null) return '–';
  if (pts===0) return res==='wrong'?'✗ 0':'–';
  return (isWC?'🎯 ':'')+'+'+pts+' pts';
}

function liveMinute(m) {
  if (!m.liveMinute) return '?';
  return m.liveMinute;
}

function canSeeBets(m) {
  return m.status==='live' || m.status==='finished' || isClosed(m);
}

function isClosed(m) {
  if (m.status==='finished'||m.status==='live'||m.status==='closed') return true;
  if (!m.kickoff && !m.date) return false;
  return new Date(m.kickoff||m.date) <= new Date();
}

function fmtAgo(ts) {
  const diff=Date.now()-ts;
  if (diff<60000) return 'ahora';
  if (diff<3600000) return Math.floor(diff/60000)+'min';
  if (diff<86400000) return Math.floor(diff/3600000)+'h';
  return Math.floor(diff/86400000)+'d';
}
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Chat ──
function renderChatPanel(matchId) {
  const m = matches.find(x=>x.id===matchId);
  const canChat = canSeeBets(m);
  if (!canChat) return '<div class="chat-section"><div class="chat-locked">💬 Los comentarios se abren cuando empieza el partido</div></div>';
  const msgs = DB.getChat(matchId);
  const players = DB.getPlayers();
  let html='<div class="chat-section" id="chat-'+matchId+'"><div class="chat-title">💬 Comentarios ('+msgs.length+')</div><div class="chat-messages" id="chat-msgs-'+matchId+'">';
  if (!msgs.length) {
    html+='<div style="font-size:12px;color:var(--text-d);text-align:center;padding:10px;">Sé el primero en comentar</div>';
  } else {
    for (const msg of msgs) {
      const sender=players.find(p=>p.id===msg.playerId)||{name:'?',colorIdx:0};
      const isMe=msg.playerId===currentPlayer.id;
      const c=color(sender.colorIdx);
      const timeAgo=fmtAgo(msg.ts);
      const myReactions=msg.reactions||{};
      html+='<div class="chat-msg '+(isMe?'mine':'')+'">'+
        '<div class="ava" style="width:26px;height:26px;background:'+c.bg+';color:'+c.tc+';font-size:10px;flex-shrink:0;">'+initials(sender.name)+'</div>'+
        '<div><div class="chat-bubble">'+escapeHtml(msg.text)+'</div>'+
        '<div class="chat-meta">'+(isMe?'Vos':sender.name)+' · '+timeAgo+'</div>'+
        '<div class="chat-reactions">'+
        REACTIONS.map(emoji=>{
          const who=myReactions[emoji]||[];
          const hasReacted=who.includes(currentPlayer.id);
          const count=who.length;
          return '<button class="react-btn '+(hasReacted?'reacted':'')+'" onclick="toggleReaction(\''+matchId+'\',\''+msg.id+'\',\''+emoji+'\')">'+
            emoji+(count>0?'<span class="react-count">'+count+'</span>':'')+'</button>';
        }).join('')+
        '</div></div></div>';
    }
  }
  html+='</div><div class="chat-input-row">'+
    '<input class="chat-input" id="chat-in-'+matchId+'" placeholder="Escribí algo..." maxlength="120" onkeydown="if(event.key===\'Enter\')sendChat(\''+matchId+'\')">'+
    '<button class="chat-send" onclick="sendChat(\''+matchId+'\')">➤</button></div></div>';
  return html;
}

function sendChat(matchId) {
  const inp=document.getElementById('chat-in-'+matchId);
  if (!inp) return;
  const text=inp.value.trim();
  if (!text) return;
  const msgs=DB.getChat(matchId);
  msgs.push({id:genId(),playerId:currentPlayer.id,text,ts:Date.now(),reactions:{}});
  DB.saveChat(matchId,msgs);
  inp.value='';
  renderView(currentView);
  toast('💬 Enviado','ok');
}

function toggleReaction(matchId, msgId, emoji) {
  const msgs=DB.getChat(matchId);
  const msg=msgs.find(x=>x.id===msgId);
  if (!msg) return;
  if (!msg.reactions) msg.reactions={};
  if (!msg.reactions[emoji]) msg.reactions[emoji]=[];
  const idx=msg.reactions[emoji].indexOf(currentPlayer.id);
  if (idx>=0) msg.reactions[emoji].splice(idx,1);
  else msg.reactions[emoji].push(currentPlayer.id);
  DB.saveChat(matchId,msgs);
  renderView(currentView);
}

    '<div style="font-size:10px;color:var(--text-d);">por cargar</div></div>'+
    '<div class="card" style="text-align:center;padding:12px 8px;"><div style="font-size:11px;color:var(--text-m);">Mis pts</div>'+
    '<div style="font-family:var(--fd);font-size:28px;font-weight:700;color:var(--accent);">'+sc.pts+'</div>'+
    '<div style="font-size:10px;color:var(--text-d);">'+sc.exact+' exactos</div></div></div>'+
    '<div style="display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;">'+

    '<button class="btn btn-secondary btn-sm" onclick="filterApuestas(\'pending\')" id="fa-pending">Sin cargar</button>'+
    '<button class="btn btn-secondary btn-sm" onclick="filterApuestas(\'exact\')" id="fa-exact">🎯 Exactos</button>'+
    '<button class="btn btn-secondary btn-sm" onclick="filterApuestas(\'wrong\')" id="fa-wrong">✗ Perdidos</button>'+
    '</div><div id="apuestas-list">';

  // ── Barra de ordenamiento + sub-filtro ──
  {
    const modes=[{v:'fecha',icon:'📅',lbl:'Fecha'},{v:'grupo',icon:'👥',lbl:'Grupo'},{v:'fase',icon:'🏆',lbl:'Fase'}];
    let selHtml='';
    if(apuestasSortMode==='fase'){
      selHtml='<option value="all">Todas las fases</option>';
      for(const [key,label] of Object.entries(PHASES)){
        if(allM.some(m=>m.phase===key))
          selHtml+='<option value="'+key+'"'+(apuestasFilter===key?' selected':'')+'>'+label+'</option>';
      }
    }else if(apuestasSortMode==='grupo'){
      selHtml='<option value="all">Todos los grupos</option>';
      const keys=[],seen=new Set();
      for(const m of allM){const k=m.group&&m.group!=='?'?m.group:(m.phase||'?');if(!seen.has(k)){seen.add(k);keys.push(k);}}
      keys.sort((a,b)=>{const aG=/^[A-Z]$/.test(a),bG=/^[A-Z]$/.test(b);if(aG&&bG)return a.localeCompare(b);if(aG)return -1;if(bG)return 1;return Object.keys(PHASES).indexOf(a)-Object.keys(PHASES).indexOf(b);});
      for(const k of keys){const lbl=/^[A-Z]$/.test(k)?'Grupo '+k:(PHASES[k]||k);selHtml+='<option value="'+k+'"'+(apuestasFilter===k?' selected':'')+'>'+lbl+'</option>';}
    }else{
      selHtml='<option value="all">Todas las fechas</option>';
      const seen=new Set();
      for(const m of allM){const d=new Date(m.kickoff||m.date);const key=d.toISOString().slice(0,10);if(!seen.has(key)){seen.add(key);const lbl=new Intl.DateTimeFormat('es-PY',{weekday:'short',day:'2-digit',month:'short'}).format(d);selHtml+='<option value="'+key+'"'+(apuestasFilter===key?' selected':'')+'>'+lbl+'</option>';}}
    }
    html+='<div style="margin-bottom:10px;">'+
      '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;overflow-x:auto;padding-bottom:2px;">'+
      '<span style="font-size:11px;color:var(--text-m);white-space:nowrap;flex-shrink:0;">Ordenar:</span>'+
      modes.map(mode=>'<button class="btn btn-secondary btn-sm'+(apuestasSortMode===mode.v?' btn-primary':'')+'" onclick="setApuestasSort(\''+mode.v+'\')">'+mode.icon+' '+mode.lbl+'</button>').join('')+
      '</div>'+
      '<select style="font-size:13px;padding:7px 12px;" onchange="setApuestasFilter(this.value)">'+selHtml+'</select>'+
      '</div>';
  }

  // ── Aplicar sub-filtro ──
  let filteredM=allM;
  if(apuestasFilter!=='all'){
    filteredM=allM.filter(m=>{
      if(apuestasSortMode==='fase') return m.phase===apuestasFilter;
      if(apuestasSortMode==='grupo') return (m.group&&m.group!=='?'?m.group:(m.phase||'?'))===apuestasFilter;
      if(apuestasSortMode==='fecha') return new Date(m.kickoff||m.date).toISOString().slice(0,10)===apuestasFilter;
      return true;
    });
  }

  // ── Grupos de apuestas según ordenamiento ──
  const apuestaGroups = [];
  if (apuestasSortMode === 'grupo') {
    const byKey={}, keyOrder=[];
    for(const m of filteredM){
      const key=m.group&&m.group!=='?'?m.group:(m.phase||'?');

    for(const key of keyOrder) apuestaGroups.push({hdr:/^[A-Z]$/.test(key)?'Grupo '+key:(PHASES[key]||key),matches:byKey[key]});
  } else if (apuestasSortMode === 'fase') {
    const byPhase={};
    for(const m of filteredM){(byPhase[m.phase]=byPhase[m.phase]||[]).push(m);}
    const phOrd=Object.keys(PHASES);
    Object.keys(byPhase).sort((a,b)=>phOrd.indexOf(a)-phOrd.indexOf(b)).forEach(ph=>apuestaGroups.push({hdr:PHASES[ph]||ph,matches:byPhase[ph]}));
  } else {
    apuestaGroups.push({matches:filteredM});
  }

  for(const grp of apuestaGroups){
    if(grp.hdr) html+='<div style="font-size:11px;font-weight:600;color:var(--text-m);text-transform:uppercase;letter-spacing:.06em;padding:6px 2px 4px;margin-top:2px;">'+grp.hdr+'</div>';
    for (const m of grp.matches) {
    const pred=myPreds.find(p=>p.matchId===m.id);
    const isWC=isWCUsed(wcData, m);
    const pp=pred&&m.homeScore!==null?provPtsForMatch(currentPlayer.id,m.id):null;
    const res=pred&&m.homeScore!==null?betResult(pred,m.homeScore,m.awayScore):'pending';
    const isOpen=m.status==='upcoming'&&!isClosed(m);
    const isLive=m.status==='live';
    const isFin=m.status==='finished';
    let rowBg='background:var(--bg-card)', statusIcon='', statusClass='';
    if (!pred&&isOpen){rowBg='background:rgba(248,113,113,.05)';statusIcon='⚠️';statusClass='pending';}
    else if(!pred){statusIcon='–';statusClass='none';}
    else if(res==='exact'){rowBg='background:rgba(74,222,128,.06)';statusIcon='🎯';statusClass='exact';}
    else if(res==='partial'){rowBg='background:rgba(245,158,11,.06)';statusIcon='✓';statusClass='partial';}
    else if(res==='wrong'){rowBg='background:rgba(248,113,113,.06)';statusIcon='✗';statusClass='wrong';}
    else if(pred&&isOpen){statusIcon='✓';statusClass='saved';}
    else if(pred&&isLive){statusIcon='⏱';statusClass='live';}
    const ptsStr=pp!==null?ptsLabel(pp,res,isWC):'–';
    const ptsCls=res==='exact'?'exact':res==='partial'?'partial':res==='wrong'?'wrong':'pending';
    html+='<div class="apuesta-row" data-status="'+statusClass+'" style="display:flex;align-items:center;gap:9px;padding:9px 12px;'+rowBg+';border-radius:var(--radius-s);border:.5px solid var(--border);margin-bottom:6px;">'+
      '<div style="font-size:16px;flex-shrink:0;width:20px;text-align:center;">'+statusIcon+'</div>'+
      '<div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+
      m.homeTeam+' vs '+m.awayTeam+(isWC?' 🎯':'')+'</div>'+
      '<div style="font-size:11px;color:var(--text-m);">'+(PHASES[m.phase]||m.phase)+(m.group?' · Gr.'+m.group:'')+
      (isLive?' <span class="live-badge"><span class="live-dot"></span>'+(m.homeScore!==null?m.homeScore+'-'+m.awayScore+' · ':'')+
        (m.liveDetail==='Descanso'?'Descanso':m.liveMinute?m.liveMinute+"'":'En vivo')+'</span>':'')+
      (isFin&&m.homeScore!==null?' · '+m.homeScore+'-'+m.awayScore:'')+
      '</div></div>'+
      '<div style="text-align:right;flex-shrink:0;">'+
      (pred?'<div style="font-family:var(--fd);font-size:15px;font-weight:700;">'+pred.homeScore+'-'+pred.awayScore+'</div>':'')+
      (m.homeScore!==null&&(isLive||isFin)?'<div style="font-size:10px;font-weight:600;margin-top:2px;color:'+(isLive?'#f97316':'var(--text-m)')+'">'+(isLive?'⏱ ':'✅ ')+m.homeScore+'-'+m.awayScore+'</div>':'')+
      '<div class="bet-pts '+ptsCls+'">'+ptsStr+'</div></div>'+
      (isOpen&&!pred?'<button class="btn-save" onclick="navigate(\'predictions\')" style="flex-shrink:0;padding:5px 10px;font-size:11px;">Cargar</button>':'')+
      '</div>';
    }   // cierra: for (const m of grp.matches)
  }     // cierra: for (const grp of apuestaGroups)
  html+='</div>';
  con.innerHTML=html;
}

function filterApuestas(filter) {
  document.querySelectorAll('[id^=fa-]').forEach(b=>b.classList.remove('btn-primary'));
  const btn=document.getElementById('fa-'+filter);
  if (btn) btn.classList.add('btn-primary');
  document.querySelectorAll('.apuesta-row').forEach(row=>{
    const st=row.dataset.status;
    let show=true;
    if (filter==='pending') show=st==='pending';
    else if (filter==='exact') show=st==='exact';
    else if (filter==='wrong') show=st==='wrong';
    row.style.display=show?'flex':'none';
  });
}

    // ── Evolución de posición ──

      });
      html += '</div>';
    }
  }

  if (perfilTab==='badges') {
    const CONSERVATIVE=['1-0','2-1','1-1','0-0','2-0'];
    const conservCount=myPreds.filter(p=>CONSERVATIVE.includes(p.homeScore+'-'+p.awayScore)).length;
    html+='<div class="fun-badges-grid">'+
      '<div class="fun-badge-card"><div class="fun-badge-icon">🦁</div><div class="fun-badge-info"><div class="fun-badge-name">El Valiente</div><div class="fun-badge-val">'+(sc.soloSurprise||0)+' vez'+(( sc.soloSurprise||0)!==1?'es':'')+' el único en acertar (×2 pts)</div></div></div>'+

    groupsFromMatches[m.group][m.awayTeam] = m.awayCode||'';
  }

  const groupKeys = Object.keys(groupsFromMatches).sort();
  if (!groupKeys.length) {
    con.innerHTML='<div class="empty"><div class="empty-icon">📋</div><p>Los grupos se cargarán cuando FIFA publique los datos del Mundial.</p></div>';
    return;
  }

  const hasLive=matches.some(m=>m.status==='live');
  let html='<div style="font-size:12px;color:var(--text-m);margin-bottom:12px;">'+
    '<span style="display:inline-block;width:10px;height:10px;background:rgba(74,222,128,.3);border-radius:2px;margin-right:4px;"></span>Top 2 clasifican &nbsp;'+

      '<span class="live-dot"></span><span>Tabla actualizada con resultado parcial en curso</span></div>';
  }

  for (const groupLetter of groupKeys) {
    const teamsObj = groupsFromMatches[groupLetter];
    const groupTeams = Object.entries(teamsObj).map(([name,code])=>({name,code}));
    const standings = calcGroupStandings(groupLetter, groupTeams);
    const liveTeams = new Set();
    for (const m of matches.filter(x=>x.group===groupLetter&&x.status==='live')) {
      liveTeams.add(m.homeTeam); liveTeams.add(m.awayTeam);
    }
    html+='<div class="group-block"><div class="group-header">'+
      '<span class="group-title">GRUPO '+groupLetter+'</span>'+
      '<span style="font-size:11px;color:var(--text-m);">'+groupTeams.length+' equipos</span></div>'+
      '<table class="standings-table"><thead><tr>'+
      '<th>Equipo</th><th>PJ</th><th>PG</th><th>PE</th><th>PP</th><th>GF</th><th>GA</th><th>DIF</th><th>PTS</th>'+
      '</tr></thead><tbody>';
    standings.forEach((team,idx)=>{
      const isLiveT=liveTeams.has(team.name);
      const gd=team.gf-team.ga;
      const gdStr=gd>0?'+'+gd:String(gd);
      const gdCls=gd>0?'gd-pos':gd<0?'gd-neg':'';
      html+='<tr class="'+(isLiveT?'live-team ':'')+''+'">'+
        '<td><div class="team-cell">'+renderFlagSm(team.code,team.name)+'<span>'+team.name+'</span>'+(isLiveT?'<span class="live-dot" style="margin-left:3px;"></span>':'')+'</div></td>'+
        '<td>'+team.pj+'</td><td>'+team.w+'</td><td>'+team.d+'</td><td>'+team.l+'</td>'+
        '<td>'+team.gf+'</td><td>'+team.ga+'</td><td class="'+gdCls+'">'+gdStr+'</td>'+
        '<td class="pts-cell">'+team.pts+'</td></tr>';
    });
    html+='</tbody></table></div>';
  }
  con.innerHTML=html;
}

function calcGroupStandings(groupLetter, groupTeams) {
  const teams={};
  for (const t of groupTeams) {
    teams[t.name]={name:t.name, code:t.code, pj:0, w:0, d:0, l:0, gf:0, ga:0, pts:0};
  }
  const relevantMatches=matches.filter(m=>m.group===groupLetter&&
    (m.status==='finished'||m.status==='live')&&
    m.homeScore!==null&&m.awayScore!==null);
  for (const m of relevantMatches) {
    const h=teams[m.homeTeam], a=teams[m.awayTeam];
    if (!h||!a) continue;
    h.pj++; a.pj++;
    h.gf+=m.homeScore; h.ga+=m.awayScore;
    a.gf+=m.awayScore; a.ga+=m.homeScore;
    if (m.homeScore>m.awayScore){h.w++;h.pts+=3;a.l++;}
    else if (m.homeScore<m.awayScore){a.w++;a.pts+=3;h.l++;}
    else {h.d++;h.pts++;a.d++;a.pts++;}
  }
  return Object.values(teams).sort((a,b)=>
    b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf||a.name.localeCompare(b.name));
}

function renderFlagSm(code, name) {
  if (!code) return '<span style="font-size:12px;color:var(--text-m);">'+( name?name.slice(0,3).toUpperCase():'?')+'</span>';
  return '<span class="team-flag-sm"><img src="https://api.fifa.com/api/v3/picture/flags-sq-2/'+code+'" alt="'+name+'" onerror="this.style.display=\'none\'"></span>';
}

// ── Partido Imprevisible ──
function getImprevisibleMatchId() {
  const allPreds = DB.getPredictions();
  const playerIds = new Set(DB.getPlayers().map(p=>p.id));
  let bestId = null, bestScore = -1;
  for (const m of matches.filter(x=>x.status!=='finished')) {
    const on = allPreds.filter(x=>x.matchId===m.id && playerIds.has(x.playerId));
    if (on.length < 3) continue;
    const h = on.filter(x=>outcome(x.homeScore,x.awayScore)==='H').length;
    const d = on.filter(x=>outcome(x.homeScore,x.awayScore)==='D').length;
    const v = on.filter(x=>outcome(x.homeScore,x.awayScore)==='V').length;
    const maxPct = Math.max(h,d,v) / on.length;
    if (maxPct > 0.4) continue;
    if ((1 - maxPct) > bestScore) { bestScore = 1 - maxPct; bestId = m.id; }
  }
  return bestId;
}
