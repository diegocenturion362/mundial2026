<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mundial 2026 · Pronósticos</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0e1a10; --bg-card: #162419; --bg-el: #1e302a;
  --accent: #4ade80; --accent-dim: rgba(74,222,128,0.12);
  --gold: #f59e0b; --gold-dim: rgba(245,158,11,0.15);
  --silver: #94a3b8; --bronze: #c97d2e;
  --text: #ecfdf5; --text-m: #7a9e82; --text-d: #3d5c44;
  --border: rgba(74,222,128,0.1); --border-md: rgba(74,222,128,0.22);
  --danger: #f87171; --radius: 12px; --radius-s: 8px;
  --fd: 'Barlow Condensed', sans-serif; --fb: 'DM Sans', sans-serif;
}
html, body { height:100%; background:var(--bg); color:var(--text); font-family:var(--fb); font-size:15px; -webkit-font-smoothing:antialiased; }

/* ── PLAYER SELECT ── */
#player-select { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem 1.25rem; background:radial-gradient(ellipse at top, #1a3a20 0%, #0e1a10 65%); }
.logo-area { text-align:center; margin-bottom:2.5rem; }
.logo-ball { font-size:56px; display:block; margin-bottom:.5rem; animation: spin 8s linear infinite; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
.logo-title { font-family:var(--fd); font-size:40px; font-weight:700; letter-spacing:.06em; }
.logo-sub { font-size:13px; color:var(--text-m); margin-top:4px; }
.select-card { width:100%; max-width:400px; background:var(--bg-card); border:.5px solid var(--border-md); border-radius:var(--radius); padding:1.5rem; }
.select-card h2 { font-family:var(--fd); font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--text-m); margin-bottom:1rem; }
.player-list { display:flex; flex-direction:column; gap:8px; margin-bottom:1.25rem; }
.player-btn { display:flex; align-items:center; gap:12px; padding:11px 14px; background:var(--bg-el); border:.5px solid var(--border); border-radius:var(--radius-s); cursor:pointer; width:100%; color:var(--text); font-family:var(--fb); font-size:15px; transition:all .15s; }
.player-btn:hover { border-color:var(--border-md); background:#233d2a; }
.player-btn .pts { margin-left:auto; font-family:var(--fd); font-size:18px; color:var(--accent); }
.divider { display:flex; align-items:center; gap:10px; margin:1rem 0; font-size:12px; color:var(--text-d); }
.divider::before,.divider::after { content:''; flex:1; height:.5px; background:var(--border); }
.new-player-form { display:flex; gap:8px; }

/* ── INPUTS / BUTTONS ── */
input[type=text],input[type=number],input[type=password],input[type=datetime-local],select {
  background:var(--bg-el); border:.5px solid var(--border-md); border-radius:var(--radius-s);
  color:var(--text); font-family:var(--fb); font-size:15px; padding:10px 14px; outline:none; transition:border-color .15s; width:100%; }
input:focus,select:focus { border-color:var(--accent); }
input::placeholder { color:var(--text-d); }
select { appearance:none; }
.btn { padding:10px 18px; border-radius:var(--radius-s); border:none; cursor:pointer; font-family:var(--fb); font-size:14px; font-weight:500; transition:all .15s; white-space:nowrap; }
.btn-primary { background:var(--accent); color:#071a0e; font-weight:600; }
.btn-primary:hover { opacity:.9; }
.btn-primary:active { transform:scale(.97); }
.btn-secondary { background:var(--bg-el); color:var(--text); border:.5px solid var(--border-md); }
.btn-secondary:hover { border-color:var(--accent); }
.btn-danger { background:rgba(248,113,113,.12); color:var(--danger); border:.5px solid rgba(248,113,113,.25); }
.btn-gold { background:var(--gold); color:#3a2000; font-weight:600; }

/* ── APP SHELL ── */
#app { display:none; flex-direction:column; min-height:100vh; padding-bottom:72px; }
.app-header { background:var(--bg-card); border-bottom:.5px solid var(--border); padding:10px 16px; display:flex; align-items:center; gap:10px; position:sticky; top:0; z-index:100; }
.header-logo { font-family:var(--fd); font-size:20px; font-weight:700; color:var(--accent); letter-spacing:.05em; }
.phase-pill { font-size:11px; color:var(--text-m); background:var(--accent-dim); padding:3px 9px; border-radius:20px; }
.header-player { margin-left:auto; display:flex; align-items:center; gap:8px; cursor:pointer; padding:5px 9px; border-radius:var(--radius-s); transition:background .15s; }
.header-player:hover { background:var(--accent-dim); }
.content { padding:16px; flex:1; max-width:520px; width:100%; margin:0 auto; }

/* Bottom nav */
.bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:520px; background:var(--bg-card); border-top:.5px solid var(--border); display:flex; z-index:100; padding-bottom:env(safe-area-inset-bottom); }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:9px 4px; cursor:pointer; color:var(--text-d); font-size:10px; gap:3px; background:none; border:none; font-family:var(--fb); transition:color .15s; }
.nav-item svg { width:21px; height:21px; stroke:currentColor; fill:none; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }
.nav-item.active { color:var(--accent); }

/* ── CARDS ── */
.card { background:var(--bg-card); border:.5px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:12px; }
.sec-title { font-family:var(--fd); font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--text-m); margin:1.25rem 0 .75rem; padding-bottom:7px; border-bottom:.5px solid var(--border); }
.sec-title:first-child { margin-top:0; }

/* ── MATCH CARD ── */
.match-card { background:var(--bg-card); border:.5px solid var(--border); border-radius:var(--radius); padding:14px 16px; margin-bottom:10px; transition:border-color .2s; }
.match-card.has-pred { border-color:rgba(74,222,128,.3); }
.match-card.closed { opacity:.72; }
.match-meta { display:flex; justify-content:space-between; font-size:11px; color:var(--text-m); margin-bottom:12px; }
.match-body { display:flex; align-items:center; gap:8px; }
.team-side { flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; }
.team-flag { line-height:1; display:flex; justify-content:center; }
.team-flag img.flag { width:36px; height:26px; border-radius:4px; border:.5px solid rgba(255,255,255,.1); object-fit:cover; display:block; }
.team-flag .flag-badge { width:36px; height:36px; border-radius:50%; background:var(--bg-el); display:flex; align-items:center; justify-content:center; font-family:var(--fd); font-size:11px; color:var(--text-m); font-weight:700; }
.team-name { font-size:12px; font-weight:500; text-align:center; }
.score-area { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.score-box { width:44px; height:44px; border:1.5px solid var(--border-md); border-radius:var(--radius-s); text-align:center; font-size:20px; font-weight:600; font-family:var(--fd); background:var(--bg-el); color:var(--text); transition:border-color .15s; padding:0; }
.score-box:focus { border-color:var(--accent); outline:none; }
.score-box:disabled { opacity:.45; cursor:not-allowed; }
.score-sep { font-family:var(--fd); font-size:22px; color:var(--text-d); user-select:none; }
.match-footer { margin-top:12px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
.wc-btn { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--text-m); cursor:pointer; padding:6px 10px; border-radius:var(--radius-s); border:.5px solid var(--border); background:none; transition:all .15s; font-family:var(--fb); }
.wc-btn:hover { border-color:var(--gold); color:var(--gold); }
.wc-btn.active { background:var(--gold-dim); border-color:var(--gold); color:var(--gold); }
.wc-btn:disabled { opacity:.3; cursor:not-allowed; }
.pill { font-size:11px; padding:3px 10px; border-radius:20px; font-weight:500; }
.pill-exact { background:rgba(74,222,128,.15); color:var(--accent); }
.pill-partial { background:var(--gold-dim); color:var(--gold); }
.pill-wrong { background:rgba(248,113,113,.12); color:var(--danger); }
.pill-info { background:var(--accent-dim); color:var(--text-m); font-size:10px; }
.btn-save { font-size:13px; padding:7px 16px; border-radius:var(--radius-s); background:var(--accent); color:#071a0e; font-weight:600; border:none; cursor:pointer; font-family:var(--fb); transition:all .15s; }
.btn-save:hover { opacity:.9; }
.btn-save.saved { background:var(--bg-el); color:var(--text-m); border:.5px solid var(--border-md); cursor:default; }
.btn-save.editing { background:rgba(245,158,11,0.15); color:var(--gold); border:.5px solid rgba(245,158,11,0.4); }
.btn-save.editing:hover { background:rgba(245,158,11,0.25); }
.login-box { width:100%;max-width:360px;display:flex;flex-direction:column;gap:12px; }
.login-title { font-size:13px;color:var(--text-m);font-weight:500;margin-bottom:2px; }
.pin-row { display:flex;gap:8px; }
.pin-input { width:52px;height:52px;text-align:center;font-family:var(--fd);font-size:24px;font-weight:700;
  background:var(--bg-el);border:.5px solid var(--border-md);border-radius:10px;color:var(--text);
  -webkit-text-security:disc;letter-spacing:2px; }
.pin-input:focus { border-color:var(--accent);outline:none; }
.login-divider { display:flex;align-items:center;gap:10px;color:var(--text-d);font-size:11px; }
.login-divider::before,.login-divider::after { content:'';flex:1;height:.5px;background:var(--border); }
.player-chips { display:flex;flex-wrap:wrap;gap:7px; }
.player-chip { display:flex;align-items:center;gap:7px;padding:7px 12px;background:var(--bg-el);
  border:.5px solid var(--border-md);border-radius:20px;cursor:pointer;transition:all .15s; }
.player-chip:hover { border-color:var(--accent);background:var(--accent-dim); }
.player-chip span { font-size:13px;font-weight:500; }
.trends-box { margin-top:10px; padding:10px 12px; background:var(--bg-el); border-radius:8px; border:.5px solid var(--border-md); }
.trends-title { font-size:11px; color:var(--text-m); margin-bottom:8px; font-weight:500; }
.trend-row { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
.trend-label { font-size:11px; color:var(--text-m); width:54px; flex-shrink:0; }
.trend-bar-wrap { flex:1; height:5px; background:var(--bg-card); border-radius:3px; overflow:hidden; }
.trend-bar { height:100%; border-radius:3px; }
.trend-pct { font-size:11px; font-weight:700; width:30px; text-align:right; flex-shrink:0; font-family:var(--fd); }
.closed-lbl { font-size:11px; color:var(--danger); }

/* ── SPECIAL PRED CARD ── */
.special-card { background:linear-gradient(135deg,#1a3a20,#0e1a10); border:.5px solid rgba(245,158,11,.3); border-radius:var(--radius); padding:16px; margin-bottom:16px; }
.sp-header { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.sp-icon { font-size:28px; }
.sp-title { font-family:var(--fd); font-size:18px; font-weight:700; }
.sp-sub { font-size:12px; color:var(--gold); margin-top:2px; }
.form-label { font-size:12px; color:var(--text-m); margin-bottom:5px; font-weight:500; }
.form-group { display:flex; flex-direction:column; flex:1; }
.form-row { display:flex; gap:8px; }

/* ── RANKING ── */
.podium-wrap { display:flex; justify-content:center; align-items:flex-end; gap:10px; margin:1rem 0 1.5rem; height:145px; }
.podium-col { display:flex; flex-direction:column; align-items:center; gap:6px; }
.podium-ava { width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--fd); font-size:15px; font-weight:700; flex-shrink:0; }
.podium-block { display:flex; flex-direction:column; align-items:center; justify-content:flex-end; padding:8px 4px; width:92px; border-radius:8px 8px 0 0; }
.pb1 { height:95px; background:rgba(245,158,11,.18); border:.5px solid rgba(245,158,11,.4); }
.pb2 { height:68px; background:rgba(148,163,184,.12); border:.5px solid rgba(148,163,184,.3); }
.pb3 { height:52px; background:rgba(201,125,46,.12); border:.5px solid rgba(201,125,46,.3); }
.podium-pts { font-family:var(--fd); font-size:16px; font-weight:700; }
.podium-name { font-size:11px; color:var(--text-m); text-align:center; max-width:92px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.rank-row { display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:.5px solid var(--border); }
.rank-row:last-child { border-bottom:none; }
.rank-row.me { background:var(--accent-dim); margin:0 -16px; padding:11px 16px; }
.rank-num { font-family:var(--fd); font-size:16px; font-weight:600; color:var(--text-d); width:22px; text-align:center; flex-shrink:0; }
.rank-info { flex:1; min-width:0; }
.rank-name { font-weight:500; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.rank-stats { font-size:11px; color:var(--text-m); margin-top:1px; }
.rank-pts { font-family:var(--fd); font-size:24px; font-weight:700; color:var(--accent); flex-shrink:0; }
.streak-badge { font-size:10px; padding:2px 7px; border-radius:20px; background:var(--gold-dim); color:var(--gold); font-weight:500; flex-shrink:0; }

/* ── ACHIEVEMENTS ── */
.ach-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.ach-card { background:var(--bg-card); border:.5px solid var(--border); border-radius:var(--radius); padding:14px 12px; text-align:center; transition:all .2s; }
.ach-card.unlocked { border-color:rgba(245,158,11,.4); background:linear-gradient(135deg,#1e2a10,#162419); }
.ach-card.locked { opacity:.3; filter:grayscale(.4); }
.ach-icon { font-size:30px; margin-bottom:6px; }
.ach-title { font-size:13px; font-weight:500; }
.ach-desc { font-size:11px; color:var(--text-m); margin-top:3px; }
.ach-status { font-size:10px; margin-top:5px; }

/* ── ADMIN ── */
.admin-section { margin-bottom:1.75rem; }
.result-row { display:flex; align-items:center; gap:10px; padding:11px 14px; background:var(--bg-el); border-radius:var(--radius-s); border:.5px solid var(--border); margin-bottom:8px; flex-wrap:wrap; }
.result-match-info { flex:1; font-size:13px; min-width:0; }
.res-box { width:42px; height:40px; border:1.5px solid var(--border-md); border-radius:var(--radius-s); text-align:center; font-size:18px; font-weight:600; font-family:var(--fd); background:var(--bg-card); color:var(--text); padding:0; }
.result-row .flag { width:22px; height:16px; border-radius:3px; border:.5px solid rgba(255,255,255,.1); object-fit:cover; vertical-align:middle; }
.result-row .flag-badge { display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:50%; background:var(--bg-card); font-family:var(--fd); font-size:9px; color:var(--text-m); font-weight:700; vertical-align:middle; }

/* ── FIFA STATUS STRIP ── */
.fifa-strip { display:flex; align-items:center; justify-content:space-between; padding:8px 14px; background:var(--bg-el); border:.5px solid var(--border); border-radius:var(--radius-s); margin-bottom:12px; font-size:12px; color:var(--text-m); gap:10px; }
.fifa-strip button { font-size:11px; padding:4px 10px; border-radius:var(--radius-s); background:var(--accent-dim); color:var(--accent); border:.5px solid var(--border-md); cursor:pointer; font-family:var(--fb); white-space:nowrap; }
.fifa-strip button:disabled { opacity:.4; cursor:not-allowed; }

/* ── TOAST ── */
.toast { position:fixed; bottom:82px; left:50%; transform:translateX(-50%) translateY(16px); background:var(--bg-el); border:.5px solid var(--border-md); color:var(--text); padding:9px 18px; border-radius:20px; font-size:13px; font-weight:500; opacity:0; transition:all .28s; white-space:nowrap; z-index:999; pointer-events:none; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.ok { border-color:rgba(74,222,128,.4); color:var(--accent); }
.toast.err { border-color:rgba(248,113,113,.35); color:var(--danger); }

/* ── EMPTY ── */
.empty { text-align:center; padding:3rem 1rem; color:var(--text-m); }
.empty-icon { font-size:40px; margin-bottom:.75rem; }

/* ── AVATAR helper ── */
.ava { border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--fd); font-weight:700; flex-shrink:0; }

/* ── LOADING INDICATOR ── */
.loading-row { text-align:center; padding:2rem 1rem; color:var(--text-m); font-size:13px; }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
.loading-dot { animation:pulse 1.4s ease-in-out infinite; display:inline-block; }
.loading-dot:nth-child(2){animation-delay:.2s} .loading-dot:nth-child(3){animation-delay:.4s}
</style>
<!-- ══ FIREBASE SDK ══ -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>

<!-- ═══════════ PLAYER SELECT ═══════════ -->
<div id="player-select">
  <div class="logo-area">
    <span class="logo-ball">⚽</span>
    <div class="logo-title">MUNDIAL 2026</div>
    <div class="logo-sub">Pronósticos entre amigos · USA · MEX · CAN</div>
  </div>
  <div class="select-card">
    <h2>¿Quién sos?</h2>
    <div class="player-list" id="existing-players">
      <p style="font-size:13px;color:var(--text-d);text-align:center;">Cargando...</p>
    </div>
    <div class="divider">o unite nuevo</div>
    <div class="new-player-form">
      <input type="text" id="new-name" placeholder="Tu nombre o apodo" style="flex:1;min-width:0;" maxlength="20"
        onkeydown="if(event.key==='Enter')createAndJoin()">
      <button class="btn btn-primary" onclick="createAndJoin()">Unirse</button>
    </div>
  </div>
</div>

<!-- ═══════════ MAIN APP ═══════════ -->
<div id="app">
  <div class="app-header">
    <span class="header-logo">MUN'26</span>
    <span class="phase-pill" id="header-phase">Mundial 2026</span>
    <div class="header-player" onclick="changePlayer()" title="Cambiar jugador">
      <div class="ava" id="header-ava" style="width:28px;height:28px;font-size:11px;"></div>
      <span id="header-name" style="font-size:13px;font-weight:500;"></span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-m);"><path d="M6 9l6 6 6-6"/></svg>
    </div>
  </div>

  <div class="content" id="main-content"></div>

  <nav class="bottom-nav">
    <button class="nav-item active" onclick="navigate('predictions')" id="nav-predictions">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12l2 2 4-4"/></svg>
      <span>Pronósticos</span>
    </button>
    <button class="nav-item" onclick="navigate('ranking')" id="nav-ranking">
      <svg viewBox="0 0 24 24"><path d="M3 20h18M8 20V10l4-4 4 4v10M12 20v-5"/></svg>
      <span>Ranking</span>
    </button>
    <button class="nav-item" onclick="navigate('history')" id="nav-history">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      <span>Historial</span>
    </button>
    <button class="nav-item" onclick="navigate('logros')" id="nav-logros">
      <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <span>Logros</span>
    </button>
    <button class="nav-item" onclick="navigate('admin')" id="nav-admin">
      <svg viewBox="0 0 24 24"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      <span>Admin</span>
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script>
// ╔══════════════════════════════════════════════════╗

// ╔══════════════════════════════════════════════════╗
// ║  DB LAYER — caché en memoria + Firebase           ║
// ╚══════════════════════════════════════════════════╝
const _cache = {};
const _writeTimers = {};
let _fbDatabase = null;

const DB = {
  get(k, fb = null) {
    if (!_cache.hasOwnProperty(k)) return fb;
    const v = _cache[k];
    // Normalizar objetos-array que Firebase puede devolver
    if (v && typeof v === 'object' && !Array.isArray(v)) {
      const keys = Object.keys(v);
      if (keys.length && keys.every(k2 => !isNaN(parseInt(k2)))) {
        return keys.map(k2 => v[k2]);
      }
    }
    return v;
  },
  set(k, v) {
    _cache[k] = v;
    clearTimeout(_writeTimers[k]);
    _writeTimers[k] = setTimeout(() => {
      if (_fbDatabase) {
        _fbDatabase.ref(FB_ROOT + '/' + k).set(v).catch(err => console.warn('FB write error:', k, err));
      }
    }, 300);
  },
  getPlayers:      () => DB.get('players', []),
  getPredictions:  () => DB.get('predictions', []),
  getWildcards:    () => DB.get('wildcards', {}),
  getSpecial:      () => DB.get('special', []),
  savePlayers:     v  => DB.set('players', v),
  savePredictions: v  => DB.set('predictions', v),
  saveWildcards:   v  => DB.set('wildcards', v),
  saveSpecial:     v  => DB.set('special', v),
};

// ── Listeners de tiempo real ──
const REALTIME_KEYS = ['players', 'predictions', 'wildcards', 'special', 'meta'];

function normalizeFirebaseValue(val) {
  // Firebase convierte arrays a objetos {0:..., 1:...} — los revertimos
  if (val && typeof val === 'object' && !Array.isArray(val)) {
    const keys = Object.keys(val);
    const isArrayLike = keys.every(k => !isNaN(parseInt(k)));
    if (isArrayLike) return keys.map(k => val[k]);
  }
  return val;
}

function setupFirebaseListeners(db) {
  REALTIME_KEYS.forEach(key => {
    db.ref(FB_ROOT + '/' + key).on('value', snap => {
      const raw = snap.val();
      if (raw === null) return;
      const val = normalizeFirebaseValue(raw);
      const prev = JSON.stringify(_cache[key]);
      const next = JSON.stringify(val);
      if (prev === next) return;
      _cache[key] = val;
      if (currentPlayer && !document.activeElement?.matches('input,textarea,select')) {
        renderView(currentView);
      }
    });
  });
}

// ── Caché de partidos FIFA en Firebase ──
// Los partidos los sigue trayendo cada cliente desde la API de FIFA,
// pero también se guardan en Firebase para compartir entre dispositivos.
function loadCachedMatchesFromFirebase(callback) {
  if (_fbDatabase) {
    _fbDatabase.ref(FB_ROOT + '/fifa_matches').get().then(snap => {
      const val = snap.val();
      if (val && Array.isArray(val) && val.length) {
        callback(val);
      } else {
        callback([]);
      }
    }).catch(() => callback([]));
  } else {
    callback([]);
  }
}

function saveCachedMatchesToFirebase(arr) {
  if (_fbDatabase && arr && arr.length) {
    _fbDatabase.ref(FB_ROOT + '/fifa_matches').set(arr).catch(() => {});
  }
}

// ── Inicialización Firebase ──
async function initFirebase() {
  firebase.initializeApp(FIREBASE_CONFIG);
  const db = firebase.database();
  _fbDatabase = db;

  let snap;
  try {
    snap = await db.ref(FB_ROOT).get();
  } catch(e) {
    console.error('Firebase read error:', e);
    throw e;
  }

  const data = snap.val() || {};
  Object.entries(data).forEach(([k, v]) => { _cache[k] = v; });

  setupFirebaseListeners(db);
}

// ╔══════════════════════════════════════════════════╗
// ║  FIFA — API y caché de partidos                   ║
// ╚══════════════════════════════════════════════════╝
const FIFA_URL = 'https://api.fifa.com/api/v3/calendar/matches?from=2026-06-11&to=2026-07-20&language=es&count=200&idCompetition=17';
const MATCH_CACHE_KEY = 'wc26_fifa_matches_v2';

// matches es la fuente de verdad global (cargada desde FIFA / caché)
let matches = [];
let fifaLoading = false;
let fifaSource  = 'Sin datos';

function loadCachedMatches() {
  // Mantiene localStorage como fallback offline
  try {
    const d = JSON.parse(localStorage.getItem(MATCH_CACHE_KEY) || '[]');
    return Array.isArray(d) ? d : [];
  } catch { return []; }
}

function saveCachedMatches(arr) {
  try { localStorage.setItem(MATCH_CACHE_KEY, JSON.stringify(arr)); } catch(e) {}
  // También guardar en Firebase para sincronizar entre dispositivos
  saveCachedMatchesToFirebase(arr);
}

// Helpers para parsear campos de texto de FIFA (arrays con Description)
function localizedText(arr, fb = '') {
  return arr && arr[0] && arr[0].Description ? arr[0].Description : fb;
}
function teamName(team, placeholder) {
  if (!team) return placeholder || 'Por definir';
  return localizedText(team.TeamName, '') || team.ShortClubName || team.Abbreviation || placeholder || 'Por definir';
}
function countryCode(team) {
  if (!team) return '';
  return String(team.IdCountry || team.Abbreviation || '').toUpperCase().slice(0,3);
}
function mapFifaStatus(statusCode) {
  if ([11,12,13].includes(statusCode)) return 'finished';
  if ([3,4,5,6,7,8,9,10].includes(statusCode)) return 'closed';
  if ([14,15].includes(statusCode)) return 'upcoming';
  return 'upcoming';
}
function mapPhase(match) {
  const g = localizedText(match.GroupName, '').toLowerCase();
  if (g.match(/grupo\s+[a-l]/i) || g.match(/group\s+[a-l]/i)) return 'grupos';
  const s = (localizedText(match.StageName, '') || '').toLowerCase();
  if (s.includes('primera') || s.includes('first stage') || s.includes('fase de grupo')) return 'grupos';
  if (s.includes('32') || s.includes('treinta')) return 'r32';
  if (s.includes('16') || s.includes('octavo') || s.includes('round of 16')) return 'r16';
  if (s.includes('cuarto') || s.includes('quarter')) return 'qf';
  if (s.includes('semi')) return 'sf';
  if (s.includes('tercer') || s.includes('third')) return 'sf';
  if (s.includes('final')) return 'final';
  if (g.startsWith('grupo') || g.startsWith('group')) return 'grupos';
  return 'grupos';
}
function normalizeFifaMatch(m) {
  const group = localizedText(m.GroupName, '');
  // Extract letter after "Grupo " for display
  const groupLetter = group.match(/[A-L]$/i) ? group.match(/[A-L]$/i)[0].toUpperCase() : group || '?';
  return {
    id:        String(m.IdMatch),
    matchNumber: m.MatchNumber || null,
    homeTeam:  teamName(m.Home, m.PlaceHolderA),
    awayTeam:  teamName(m.Away, m.PlaceHolderB),
    homeCode:  countryCode(m.Home),
    awayCode:  countryCode(m.Away),
    group:     groupLetter,
    phase:     mapPhase(m),
    date:      m.Date,
    kickoff:   m.Date,
    status:    mapFifaStatus(m.MatchStatus),
    homeScore: Number.isInteger(m.HomeTeamScore) ? m.HomeTeamScore : null,
    awayScore: Number.isInteger(m.AwayTeamScore) ? m.AwayTeamScore : null,
    venue:     localizedText(m.Stadium && m.Stadium.Name, ''),
    city:      localizedText(m.Stadium && m.Stadium.CityName, ''),
  };
}

async function loadFifaMatches({ silent = false } = {}) {
  if (fifaLoading) return;
  fifaLoading = true;
  updateFifaStrip('Actualizando...', true);
  if (!silent) toast('Actualizando partidos desde FIFA…');

  try {
    const res  = await fetch(FIFA_URL, { cache:'no-store' });
    if (!res.ok) throw new Error(`FIFA: ${res.status}`);
    const data = await res.json();

    // Merge: si hay overrides manuales en caché (status=finished con score), preservarlos
    const existing = Object.fromEntries(matches.map(m => [m.id, m]));
    const fresh = (data.Results || [])
      .map(normalizeFifaMatch)
      .sort((a,b) => new Date(a.kickoff) - new Date(b.kickoff));

    // Preservar overrides manuales de admin (si FIFA aún dice upcoming pero admin ya ingresó resultado)
    for (const m of fresh) {
      const ex = existing[m.id];
      if (ex && ex.status === 'finished' && ex.homeScore !== null && m.status !== 'finished') {
        m.status = ex.status; m.homeScore = ex.homeScore; m.awayScore = ex.awayScore;
      }
      if (ex && ex.status === 'closed' && m.status === 'upcoming') {
        m.status = 'closed';
      }
    }

    matches = fresh;
    saveCachedMatches(matches);
    fifaSource = `FIFA · ${matches.length} partidos`;
    if (!silent) toast(`✓ ${matches.length} partidos cargados`, 'ok');
    updateFifaStrip(fifaSource, false);
    if (currentPlayer) renderView(currentView);
  } catch(err) {
    fifaSource = matches.length ? `Caché · ${matches.length} partidos` : 'FIFA no disponible';
    updateFifaStrip(fifaSource, false);
    if (!silent) toast('No se pudo conectar con FIFA', 'err');
  } finally {
    fifaLoading = false;
  }
}

function updateFifaStrip(text, loading) {
  document.querySelectorAll('.fifa-source').forEach(el => el.textContent = text);
  document.querySelectorAll('.fifa-refresh-btn').forEach(btn => { btn.disabled = loading; });
}

const genId    = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);
const initials = n => n.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);
const color    = idx => AVATAR_COLORS[idx % AVATAR_COLORS.length];
const outcome  = (h,a) => h>a?'H':a>h?'A':'D';

function fmtDate(d) {
  try {
    return new Intl.DateTimeFormat('es-PY', {
      weekday:'short', day:'2-digit', month:'short',
      hour:'2-digit', minute:'2-digit'
    }).format(new Date(d));
  } catch { return d || ''; }
}

// Bloqueado si: ya pasó el horario de inicio, o está cerrado/finalizado
function isClosed(m) {
  if (m.status === 'finished' || m.status === 'closed') return true;
  const kickoff = m.kickoff || m.date;
  if (!kickoff) return false;
  return Date.now() >= new Date(kickoff).getTime();
}

function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + type;
  setTimeout(() => { el.className = 'toast'; }, 2600);
}

function avaEl(player, size=36) {
  const c  = color(player.colorIdx);
  const fs = Math.round(size * 0.38);
  return `<div class="ava" style="width:${size}px;height:${size}px;background:${c.bg};color:${c.tc};font-size:${fs}px;">${initials(player.name)}</div>`;
}

// Genera HTML de bandera real (imagen FIFA) o badge con iniciales
function renderFlag(code, teamNameStr) {
  const c = String(code || '').trim().toUpperCase();
  const ini = initials(teamNameStr || '??');
  if (!/^[A-Z]{3}$/.test(c)) {
    return `<span class="flag-badge">${ini}</span>`;
  }
  const src = `https://api.fifa.com/api/v3/picture/flags-sq-2/${c}`;
  const fallback = `this.style.display='none';this.insertAdjacentHTML('afterend','<span class=\\'flag-badge\\'>${ini}</span>')`;
  return `<img class="flag" src="${src}" alt="${teamNameStr}" loading="lazy" onerror="${fallback}">`;
}

// Inline flag small (para admin)
function inlineFlag(code, teamNameStr) {
  const c = String(code || '').trim().toUpperCase();
  const ini = initials(teamNameStr || '??');
  if (!/^[A-Z]{3}$/.test(c)) return `<span class="flag-badge" style="width:18px;height:18px;font-size:7px;">${ini}</span>`;
  const src = `https://api.fifa.com/api/v3/picture/flags-sq-2/${c}`;
  const fb  = `this.style.display='none';this.insertAdjacentHTML('afterend','<span class=\\'flag-badge\\'style=\\'width:18px;height:18px;font-size:7px;\\'>${ini}</span>')`;
  return `<img class="flag" src="${src}" alt="" loading="lazy" style="width:22px;height:16px;vertical-align:middle;" onerror="${fb}">`;
}

// ╔══════════════════════════════════════════════════╗
// ║  SCORING ENGINE                                   ║
// ╚══════════════════════════════════════════════════╝
function scorePlayer(playerId) {
  const finished = matches.filter(m => m.status === 'finished');
  const preds    = DB.getPredictions().filter(p => p.playerId === playerId);
  const wc       = DB.getWildcards()[playerId] || {};
  const special  = DB.getSpecial().find(s => s.playerId === playerId);

  let pts=0, exact=0, partial=0, maxStreak=0, curStreak=0, wildcardWin=false, totalPreds=0;

  for (const m of finished) {
    const p = preds.find(x => x.matchId === m.id);
    if (!p) { curStreak=0; continue; }
    totalPreds++;
    const isWC = wc[m.phase] === m.id;
    let mp = 0;
    if (p.homeScore === m.homeScore && p.awayScore === m.awayScore) {
      mp=3; exact++; curStreak++;
    } else if (outcome(p.homeScore,p.awayScore) === outcome(m.homeScore,m.awayScore)) {
      mp=1; partial++; curStreak++;
    } else { curStreak=0; }
    if (isWC && mp>0) { mp*=2; wildcardWin=true; }
    maxStreak = Math.max(maxStreak, curStreak);
    pts += mp;
  }

  // Pronósticos especiales
  const meta = DB.get('meta', {});
  let championOk = false;
  if (special?.champion && meta.champion) {
    if (special.champion.trim().toLowerCase() === meta.champion.trim().toLowerCase()) {
      pts += 15; championOk = true;
    }
  }
  if (special?.topScorer && meta.topScorer) {
    if (special.topScorer.trim().toLowerCase() === meta.topScorer.trim().toLowerCase()) pts += 10;
  }

  return { pts, exact, partial, maxStreak, curStreak, wildcardWin, totalPreds, championOk };
}

function allScores() {
  return DB.getPlayers()
    .map(p => ({ ...p, ...scorePlayer(p.id) }))
    .sort((a,b) => b.pts - a.pts);
}

// ── Hashear PIN (simple, no crítico — es una quiniela entre amigos) ──
function hashPin(pin) {
  let h = 0;
  for (let i = 0; i < pin.length; i++) h = (Math.imul(31, h) + pin.charCodeAt(i)) | 0;
  return h.toString(36);
}

function renderLoginScreen() {
  const players = DB.getPlayers();
  // Solo mostrar los chips si hay pocos jugadores (≤8) para no hacer la pantalla enorme
  // Con "Recordarme", la mayoría entra automático y no llega a ver esta lista
  const chips = players.length && players.length <= 8 ? `
    <div class="login-divider">¿Ya jugás? Seleccioná tu nombre</div>
    <div class="player-chips">
      ${players.map(p => {
        const c = color(p.colorIdx);
        return \`<div class="player-chip" onclick="quickLogin('${p.id}')">
          <div class="ava" style="width:28px;height:28px;background:\${c.bg};color:\${c.tc};font-size:10px;">\${initials(p.name)}</div>
          <span>\${p.name}</span>
        </div>\`;
      }).join('')}
    </div>` : players.length > 8 ? `
    <div class="login-divider">¿Ya jugás? Ingresá tu nombre y PIN</div>` : '';

  return `
    <div style="text-align:center;">
      <div style="font-size:52px;">⚽</div>
      <div style="font-family:var(--fd);font-size:28px;font-weight:800;letter-spacing:.06em;">MUNDIAL 2026</div>
      <div style="font-size:13px;color:var(--text-m);margin-top:.25rem;">Pronósticos entre amigos</div>
    </div>
    <div class="login-box">
      <div>
        <div class="login-title">Tu nombre</div>
        <input id="ln-name" type="text" placeholder="Ej: Diego" maxlength="20" style="width:100%;"
          onkeydown="if(event.key==='Enter')document.getElementById('ln-pin-0').focus()">
      </div>
      <div>
        <div class="login-title">PIN de 4 dígitos</div>
        <div class="pin-row">
          ${[0,1,2,3].map(i => `<input class="pin-input" id="ln-pin-${i}" type="tel" maxlength="1" inputmode="numeric"
            oninput="pinMove(${i},this.value)"
            onkeydown="pinKey(event,${i})">`).join('')}
        </div>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="loginWithPin()">Entrar →</button>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text-m);">
        <input type="checkbox" id="ln-remember" style="width:16px;height:16px;accent-color:var(--accent);">
        Recordarme en este dispositivo
      </label>
      ${chips}
    </div>`;
}

function renderPlayerSelect() {
  const el = document.getElementById('player-select');
  el.innerHTML = renderLoginScreen();
}

function pinMove(idx, val) {
  if (val && idx < 3) document.getElementById('ln-pin-'+(idx+1)).focus();
}

function pinKey(e, idx) {
  if (e.key === 'Backspace' && !e.target.value && idx > 0)
    document.getElementById('ln-pin-'+(idx-1)).focus();
  if (e.key === 'Enter') loginWithPin();
}

function getPin() {
  return [0,1,2,3].map(i => document.getElementById('ln-pin-'+i)?.value || '').join('');
}

function loginWithPin() {
  const name = document.getElementById('ln-name')?.value?.trim();
  const pin  = getPin();
  if (!name || name.length < 2) { toast('Ingresá tu nombre','err'); return; }
  if (pin.length !== 4 || !/^\d{4}$/.test(pin)) { toast('PIN de 4 dígitos numéricos','err'); return; }

  const pinHash = hashPin(pin);
  const players = DB.getPlayers();
  const existing = players.find(p => p.name.toLowerCase() === name.toLowerCase());

  if (existing) {
    // Jugador existente — verificar PIN
    if (!existing.pinHash) {
      // Primera vez que usa PIN — lo asignamos
      existing.pinHash = pinHash;
      DB.savePlayers(players);
      const rem0 = document.getElementById('ln-remember')?.checked;
      doLogin(existing, rem0);
    } else if (existing.pinHash === pinHash) {
      const rem1 = document.getElementById('ln-remember')?.checked;
      doLogin(existing, rem1);
    } else {
      toast('PIN incorrecto 🔒','err');
    }
  } else {
    // Jugador nuevo
    const np = { id:genId(), name, colorIdx:players.length, pinHash, joinedAt:Date.now() };
    players.push(np);
    DB.savePlayers(players);
    toast('¡Bienvenido/a ' + name + '! 🎉','ok');
    const rem2 = document.getElementById('ln-remember')?.checked;
    doLogin(np, rem2);
  }
}

function quickLogin(id) {
  // Acceso rápido desde chips — pide PIN igual
  const p = DB.getPlayers().find(x => x.id === id);
  if (!p) return;
  const sel = document.getElementById('player-select');
  if (!sel) return;
  // Pre-llenar nombre y enfocar PIN
  const nameEl = document.getElementById('ln-name');
  if (nameEl) { nameEl.value = p.name; document.getElementById('ln-pin-0').focus(); }
}

function doLogin(p, remember=false) {
  currentPlayer = p;
  sessionStorage.setItem('wc26_cp', JSON.stringify(p));
  if (remember) localStorage.setItem('wc26_remember', JSON.stringify({id: p.id}));
  showApp();
}

function selectPlayer(id) {
  const p = DB.getPlayers().find(x => x.id === id);
  if (!p) return;
  doLogin(p);
}

function changePlayer() {
  sessionStorage.removeItem('wc26_cp');
  localStorage.removeItem('wc26_remember');
  currentPlayer = null;
  document.getElementById('app').style.display = 'none';
  const sel = document.getElementById('player-select');

function showApp() {
  document.getElementById('player-select').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  const c  = color(currentPlayer.colorIdx);
  const av = document.getElementById('header-ava');
  av.style.background = c.bg; av.style.color = c.tc;
  av.textContent = initials(currentPlayer.name);
  document.getElementById('header-name').textContent = currentPlayer.name;
  navigate('predictions');
}

function navigate(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('nav-' + view);
  if (el) el.classList.add('active');
  renderView(view);
}

function renderView(v) {
  const c = document.getElementById('main-content');
  if      (v === 'predictions') renderPredictions(c);
  else if (v === 'ranking')     renderRanking(c);
  else if (v === 'history')     renderHistory(c);
  else if (v === 'logros')      renderLogros(c);
  else if (v === 'admin')       renderAdmin(c);
}

function renderPredictions(con) {
  const preds  = DB.getPredictions();
  const wcs    = DB.getWildcards();
  const myWC   = wcs[currentPlayer.id] || {};
  const special = DB.getSpecial().find(s => s.playerId === currentPlayer.id);

  // Franja FIFA
  let html = `<div class="fifa-strip">
    <span class="fifa-source">${fifaSource}</span>
    <button class="fifa-refresh-btn" onclick="loadFifaMatches()" ${fifaLoading?'disabled':''}>↻ Actualizar</button>
  </div>`;

  if (!matches.length) {
    html += `<div class="empty"><div class="empty-icon">📶</div>
      <p style="margin-bottom:1rem;">Conectando con FIFA…</p>
      <div class="loading-row"><span class="loading-dot">●</span><span class="loading-dot"> ●</span><span class="loading-dot"> ●</span></div>
    </div>`;
    con.innerHTML = html; return;
  }

  // Pronósticos especiales
  html += `<div class="special-card">
    <div class="sp-header">
      <div class="sp-icon">🏆</div>
      <div><div class="sp-title">Pronósticos Especiales</div><div class="sp-sub">Hasta 25 puntos en juego · Se bloquean al inicio del torneo</div></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div>
        <div class="form-label">🥇 Campeón del Mundial <span style="color:var(--gold);">+15 pts</span></div>
        <div style="display:flex;gap:8px;">
          <input type="text" id="sp-champ" placeholder="País campeón" style="flex:1;" value="${special?.champion||''}" ${special?.champion?'disabled':''}>
          ${!special?.champion
            ? `<button class="btn btn-gold" onclick="saveSpecial('champion')" style="padding:10px 14px;">Guardar</button>`
            : `<span style="padding:10px;font-size:18px;">✅</span>`}
        </div>
      </div>
      <div>
        <div class="form-label">⚽ Goleador del torneo <span style="color:var(--gold);">+10 pts</span></div>
        <div style="display:flex;gap:8px;">
          <input type="text" id="sp-scorer" placeholder="Nombre del jugador" style="flex:1;" value="${special?.topScorer||''}" ${special?.topScorer?'disabled':''}>
          ${!special?.topScorer
            ? `<button class="btn btn-gold" onclick="saveSpecial('scorer')" style="padding:10px 14px;">Guardar</button>`
            : `<span style="padding:10px;font-size:18px;">✅</span>`}
        </div>
      </div>
    </div>
  </div>`;

  // Partidos no finalizados, agrupados por fase
  const upcoming = matches.filter(m => m.status !== 'finished');
  if (!upcoming.length) {
    html += `<div class="empty"><div class="empty-icon">🎉</div><p>¡Todos los partidos están finalizados!</p></div>`;
    con.innerHTML = html; return;
  }

  const byPhase = {};
  for (const m of upcoming) {
    (byPhase[m.phase] = byPhase[m.phase]||[]).push(m);
  }
  const phaseOrder = Object.keys(PHASES);
  const sortedPhases = Object.keys(byPhase).sort((a,b) => phaseOrder.indexOf(a)-phaseOrder.indexOf(b));

  for (const phase of sortedPhases) {
    const phaseMatches = byPhase[phase];
    const wcUsedId = myWC[phase];
    const wcAvail  = !wcUsedId;

    html += `<div class="sec-title">${PHASES[phase]||phase}
      ${wcAvail ? '<span style="color:var(--gold);font-size:11px;margin-left:6px;">🃏 Tenés un comodín disponible</span>' : ''}
    </div>`;

    for (const m of phaseMatches) {
      const pred   = preds.find(p => p.playerId===currentPlayer.id && p.matchId===m.id);
      const closed = isClosed(m);
      const isWC   = myWC[phase] === m.id;
      const canWC  = wcAvail || isWC;

      // Meta line: group + date + venue
      const metaLeft  = m.group && m.group !== '?' ? `Grupo ${m.group}` : (PHASES[phase]||phase);
      const metaRight = fmtDate(m.kickoff || m.date);

      html += `<div class="match-card ${pred?'has-pred':''} ${closed?'closed':''}">
        <div class="match-meta">
          <span>${metaLeft}${m.city?' · '+m.city:''}</span>
          <span>${metaRight}</span>
        </div>
        <div class="match-body">
          <div class="team-side">
            <div class="team-flag">${renderFlag(m.homeCode, m.homeTeam)}</div>
            <div class="team-name">${m.homeTeam}</div>
          </div>
          <div class="score-area">
            <input type="number" class="score-box" id="h-${m.id}" min="0" max="20" placeholder="–"
              value="${pred!=null?pred.homeScore:''}" ${closed?'disabled':''}>
            <span class="score-sep">:</span>
            <input type="number" class="score-box" id="a-${m.id}" min="0" max="20" placeholder="–"
              value="${pred!=null?pred.awayScore:''}" ${closed?'disabled':''}>
          </div>
          <div class="team-side">
            <div class="team-flag">${renderFlag(m.awayCode, m.awayTeam)}</div>
            <div class="team-name">${m.awayTeam}</div>
          </div>
        </div>
        <div class="match-footer">
          ${closed
            ? `<span class="closed-lbl">🔒 ${m.status==='finished'?'Finalizado':'Cerrado'}</span>`
            : `<button class="wc-btn ${isWC?'active':''}" id="wc-${m.id}"
                onclick="toggleWC('${m.id}','${phase}')" ${!canWC?'disabled':''}
                title="${isWC?'Quitar comodín':wcAvail?'Usar comodín (×2 pts)':'Comodín ya usado en este torneo'}">
                🃏 ${isWC?'Comodín ×2':'Comodín'}
              </button>`}
          ${closed
            ? `<span class="pill pill-info">${pred!=null?`${pred.homeScore}-${pred.awayScore}`:'Sin pronóstico'}</span>`
            : pred!=null
              ? `<button class="btn-save editing" id="sv-${m.id}" onclick="savePred('${m.id}')">✏️ Actualizar</button>`
              : `<button class="btn-save" id="sv-${m.id}" onclick="savePred('${m.id}')">Guardar</button>`}
        </div>
        ${!closed ? renderTrends(m.id) : ''}
      </div>`;
    }
  }

  con.innerHTML = html;
}

function renderTrends(matchId) {
  const allPreds = DB.getPredictions().filter(p => p.matchId === matchId);
  const total = allPreds.length;
  const players = DB.getPlayers();
  if (!total) return `<div class="trends-box"><div class="trends-title">📊 Tendencias · Nadie apostó todavía</div></div>`;

  const homeWins = allPreds.filter(p => p.homeScore > p.awayScore).length;
  const draws    = allPreds.filter(p => p.homeScore === p.awayScore).length;
  const awayWins = allPreds.filter(p => p.homeScore < p.awayScore).length;
  const m = matches.find(x => x.id === matchId);

  const bar = (count, color) => {
    const pct = total > 0 ? Math.round(count/total*100) : 0;
    return `<div class="trend-row">
      <span class="trend-label">${color === '#4ade80' ? (m?.homeTeam?.split(' ')[0]||'Local') : color === '#94a3b8' ? 'Empate' : (m?.awayTeam?.split(' ')[0]||'Visit.')}</span>
      <div class="trend-bar-wrap"><div class="trend-bar" style="width:${pct}%;background:${color};"></div></div>
      <span class="trend-pct" style="color:${color};">${pct}%</span>
    </div>`;
  };

  // Top marcadores apostados
  const scoreCounts = {};
  for (const p of allPreds) {
    const k = `${p.homeScore}-${p.awayScore}`;
    scoreCounts[k] = (scoreCounts[k]||0)+1;
  }
  const topScores = Object.entries(scoreCounts).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const topHtml = topScores.map(([sc, n]) =>
    `<span style="font-size:11px;background:var(--bg-card);padding:2px 8px;border-radius:4px;border:.5px solid var(--border-md);">${sc} <span style="color:var(--text-m);">(${n})</span></span>`
  ).join('');

  return `<div class="trends-box">
    <div class="trends-title">📊 Tendencias · ${total} de ${players.length} apostaron</div>
    ${bar(homeWins,'#4ade80')}
    ${bar(draws,'#94a3b8')}
    ${bar(awayWins,'#60a5fa')}
    ${topScores.length ? `<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">${topHtml}</div>` : ''}
  </div>`;
}

function savePred(matchId) {
  const h = document.getElementById('h-'+matchId).value;
  const a = document.getElementById('a-'+matchId).value;
  if (h===''||a==='') { toast('Ingresá ambos marcadores','err'); return; }
  const m = matches.find(x => x.id === matchId);
  if (m && isClosed(m)) { toast('El partido ya no acepta pronósticos','err'); return; }
  const preds = DB.getPredictions();
  const idx   = preds.findIndex(p => p.playerId===currentPlayer.id && p.matchId===matchId);
  const rec   = { id:genId(), playerId:currentPlayer.id, matchId, homeScore:parseInt(h), awayScore:parseInt(a) };
  if (idx>=0) preds[idx]=rec; else preds.push(rec);
  DB.savePredictions(preds);
  const btn = document.getElementById('sv-'+matchId);
  if (btn) { btn.textContent='✓ Guardado'; btn.classList.add('saved'); }
  toast('Pronóstico guardado ✓','ok');
}

function toggleWC(matchId, phase) {
  const wcs = DB.getWildcards();
  if (!wcs[currentPlayer.id]) wcs[currentPlayer.id] = {};
  const cur = wcs[currentPlayer.id][phase];
  if (cur === matchId) {
    delete wcs[currentPlayer.id][phase];
    toast('Comodín liberado');
  } else {
    wcs[currentPlayer.id][phase] = matchId;
    toast('🃏 Comodín activado — puntos ×2 para este partido','ok');
  }
  DB.saveWildcards(wcs);
  renderView('predictions');
}

function saveSpecial(type) {
  const val = document.getElementById(type==='champion'?'sp-champ':'sp-scorer').value.trim();
  if (!val) { toast('Ingresá el valor','err'); return; }
  const specials = DB.getSpecial();
  let sp = specials.find(s => s.playerId===currentPlayer.id);
  if (!sp) { sp={id:genId(),playerId:currentPlayer.id}; specials.push(sp); }
  if (type==='champion') sp.champion=val; else sp.topScorer=val;
  DB.saveSpecial(specials);
  toast('Pronóstico especial guardado 🏆','ok');
  renderView('predictions');
}

function renderRanking(con) {
  const scores = allScores();
  if (!scores.length) {
    con.innerHTML='<div class="empty"><div class="empty-icon">👥</div><p>Aún no hay jugadores registrados.</p></div>'; return;
  }

  let podHTML = '<div class="podium-wrap">';
  const podOrder = scores.length>=3 ? [scores[1],scores[0],scores[2]]
                 : scores.length===2 ? [scores[1],scores[0]] : [scores[0]];
  const pbClass  = scores.length>=2 ? ['pb2','pb1','pb3'] : ['pb1'];
  const medals   = scores.length>=2 ? ['🥈','👑','🥉'] : ['👑'];
  const pColors  = ['var(--silver)','var(--gold)','var(--bronze)'];

  podOrder.forEach((p,i) => {
    const c    = color(p.colorIdx);
    const ci   = scores.length>=2 ? i : 0;
    const ptsC = pColors[ci] || 'var(--text)';
    podHTML += `<div class="podium-col">
      <div class="podium-ava" style="background:${c.bg};color:${c.tc};border:2px solid ${ptsC};">${initials(p.name)}</div>
      <div class="podium-block ${pbClass[ci]||'pb1'}">
        <span style="font-size:${ci===1?'22':'16'}px;margin-bottom:2px;">${medals[ci]}</span>
        <span class="podium-pts" style="color:${ptsC};">${p.pts}</span>
      </div>
      <div class="podium-name">${p.name}</div>
    </div>`;
  });
  podHTML += '</div>';

  const goldColors = ['var(--gold)','var(--silver)','var(--bronze)'];
  let tableHTML = '<div class="card" style="padding:0 16px;">';
  scores.forEach((p,i) => {
    const c    = color(p.colorIdx);
    const isMe = p.id===currentPlayer.id;
    tableHTML += `<div class="rank-row${isMe?' me':''}">
      <span class="rank-num" style="color:${i<3?goldColors[i]:'var(--text-d)'};">${i+1}</span>
      ${avaEl(p,36)}
      <div class="rank-info">
        <div class="rank-name">${p.name}${isMe?' <span style="font-size:10px;color:var(--accent);">· vos</span>':''}</div>
        <div class="rank-stats">🎯 ${p.exact} exactos &nbsp;✓ ${p.partial} parciales</div>
      </div>
      ${p.curStreak>=2 ? `<span class="streak-badge">🔥 ${p.curStreak}</span>` : ''}
      <span class="rank-pts">${p.pts}</span>
    </div>`;
  });
  tableHTML += '</div>';

  con.innerHTML = podHTML + tableHTML;
}

// ║  HISTORY VIEW                                     ║
// ╚══════════════════════════════════════════════════╝
function renderHistory(con) {
  const finished = matches.filter(m => m.status==='finished');
  const preds    = DB.getPredictions().filter(p => p.playerId===currentPlayer.id);
  const myWC     = DB.getWildcards()[currentPlayer.id] || {};

  if (!finished.length) {
    con.innerHTML='<div class="empty"><div class="empty-icon">📭</div><p>Aún no hay partidos finalizados.</p></div>'; return;
  }

  let cardsHTML = '';
  for (const m of [...finished].reverse()) {
    const p    = preds.find(x => x.matchId===m.id);
    const isWC = myWC[m.phase] === m.id;
    let pts=0, pillC='pill-wrong', pillT='0 pts';

    if (p) {
      if (p.homeScore===m.homeScore && p.awayScore===m.awayScore) {
        pts=isWC?6:3; pillC='pill-exact'; pillT=`+${pts} pts${isWC?' 🃏':''}`;
      } else if (outcome(p.homeScore,p.awayScore)===outcome(m.homeScore,m.awayScore)) {
        pts=isWC?2:1; pillC='pill-partial'; pillT=`+${pts} pts${isWC?' 🃏':''}`;
      }
    }

    cardsHTML += `<div class="match-card">
      <div class="match-meta">
        <span>${PHASES[m.phase]||m.phase}${m.group&&m.group!=='?'?' · Grupo '+m.group:''}</span>
        <span>${fmtDate(m.kickoff||m.date)}</span>
      </div>
      <div class="match-body">
        <div class="team-side">
          <div class="team-flag">${renderFlag(m.homeCode, m.homeTeam)}</div>
          <div class="team-name">${m.homeTeam}</div>
        </div>
        <div style="text-align:center;flex-shrink:0;">
          <div style="font-family:var(--fd);font-size:28px;font-weight:700;letter-spacing:.05em;">${m.homeScore} : ${m.awayScore}</div>
          <div style="font-size:11px;color:var(--text-m);margin-top:2px;">Resultado oficial</div>
          <div style="font-size:12px;color:var(--text-d);margin-top:4px;">${p?`Tu pred: ${p.homeScore}-${p.awayScore}`:'Sin pronóstico'}</div>
        </div>
        <div class="team-side">
          <div class="team-flag">${renderFlag(m.awayCode, m.awayTeam)}</div>
          <div class="team-name">${m.awayTeam}</div>
        </div>
      </div>
      <div class="match-footer" style="justify-content:flex-end;">
        <span class="pill ${pillC}">${pillT}</span>
      </div>
    </div>`;
  }

  const score = scorePlayer(currentPlayer.id);
  con.innerHTML = `
    <div class="card" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div>
        <div style="font-size:12px;color:var(--text-m);">Total acumulado</div>
        <div style="font-family:var(--fd);font-size:32px;font-weight:700;color:var(--accent);">${score.pts} pts</div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:12px;color:var(--text-m);">Exactos / Parciales</div>
        <div style="font-family:var(--fd);font-size:28px;font-weight:700;">${score.exact} <span style="color:var(--text-d);">/</span> ${score.partial}</div>
      </div>
    </div>
  ` + cardsHTML;
}

    ${pending.filter(m=>!isClosed(m)).map(m=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg-el);border-radius:var(--radius-s);border:.5px solid var(--border);margin-bottom:8px;gap:8px;">
      <span style="font-size:13px;min-width:0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${inlineFlag(m.homeCode,m.homeTeam)} ${m.homeTeam} vs ${m.awayTeam}</span>
      <button class="btn btn-secondary" onclick="adminClose('${m.id}')" style="padding:6px 12px;font-size:12px;flex-shrink:0;">Cerrar</button>
    </div>`).join('')}
  </div>` : ''}

  <!-- Validar pronósticos especiales -->
  <div class="admin-section">
    <div class="sec-title">Validar pronósticos especiales</div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div>
        <div class="form-label">Campeón del Mundial (+15 pts)</div>
        <div style="display:flex;gap:8px;">
          <input type="text" id="meta-champ" placeholder="País campeón" value="${meta.champion||''}">
          <button class="btn btn-gold" onclick="saveMeta('champion')" style="padding:10px 14px;">Guardar</button>
        </div>
      </div>
      <div>
        <div class="form-label">Goleador del torneo (+10 pts)</div>
        <div style="display:flex;gap:8px;">
          <input type="text" id="meta-scorer" placeholder="Nombre del jugador" value="${meta.topScorer||''}">
          <button class="btn btn-gold" onclick="saveMeta('scorer')" style="padding:10px 14px;">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Exportar / Importar -->
  <div class="admin-section">
    <div class="sec-title">Copias de seguridad</div>
    <p style="font-size:13px;color:var(--text-m);margin-bottom:.75rem;">Exportá todos los datos para hacer backup o compartirlos entre dispositivos.</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-secondary" onclick="exportData()">📤 Exportar JSON</button>
      <button class="btn btn-secondary" onclick="importData()">📥 Importar JSON</button>
    </div>
  </div>

  <!-- Danger zone -->
  <div class="admin-section">
    <div class="sec-title" style="color:var(--danger);">Zona de peligro</div>
    <div style="display:flex;flex-direction:column;gap:10px;">

      <div style="padding:12px 14px;background:rgba(248,113,113,.07);border:.5px solid rgba(248,113,113,.2);border-radius:10px;">
        <div style="font-size:13px;font-weight:600;margin-bottom:8px;">👤 Gestión de jugadores</div>
        ${DB.getPlayers().length === 0
          ? '<p style="font-size:12px;color:var(--text-d);">No hay jugadores registrados.</p>'
          : DB.getPlayers().map(p => {
              const c = color(p.colorIdx);
              return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:.5px solid var(--border);">
                <div class="ava" style="width:32px;height:32px;background:${c.bg};color:${c.tc};font-size:11px;flex-shrink:0;">${initials(p.name)}</div>
                <div style="flex:1;min-width:0;">
                  <div style="font-size:13px;font-weight:500;">${p.name}</div>
                  <div style="font-size:11px;color:var(--text-d);">PIN: ${p.pinHash ? '••••' : 'sin PIN'}</div>
                </div>
                <button class="btn btn-secondary" style="padding:5px 10px;font-size:11px;" onclick="adminResetPin('${p.id}')">🔑 Reset PIN</button>
                <button class="btn btn-danger" style="padding:5px 10px;font-size:11px;" onclick="adminDeletePlayer('${p.id}')">✕</button>
              </div>`;
            }).join('')}
        <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-danger" onclick="clearPlayers()" style="font-size:12px;">🗑 Borrar todos</button>
        </div>
      </div>

      <div style="padding:12px 14px;background:rgba(248,113,113,.07);border:.5px solid rgba(248,113,113,.2);border-radius:10px;">
        <div style="font-size:13px;font-weight:600;margin-bottom:4px;">💣 Reiniciar todo</div>
        <div style="font-size:12px;color:var(--text-m);margin-bottom:10px;">Borra absolutamente todo, incluyendo el caché de partidos FIFA.</div>
        <button class="btn btn-danger" onclick="if(confirm('¿Borrar TODOS los datos? Esta acción no se puede deshacer.'))clearAll()">💣 Borrar todo</button>
      </div>

    </div>
  </div>`;
}

function authAdmin() {
  if (document.getElementById('ap').value === ADMIN_PASS) {
    adminAuth = true; renderView('admin');
  } else { toast('Contraseña incorrecta','err'); }
}

function adminResult(matchId) {
  const h = document.getElementById('rh-'+matchId).value;
  const a = document.getElementById('ra-'+matchId).value;
  if (h===''||a==='') { toast('Ingresá el resultado','err'); return; }
  const m = matches.find(x => x.id===matchId);
  if (!m) return;
  m.status='finished'; m.homeScore=parseInt(h); m.awayScore=parseInt(a);
  saveCachedMatches(matches);
  toast(`${m.homeTeam} ${h} – ${a} ${m.awayTeam} ✓`,'ok');
  renderView('admin');
}

function adminClose(matchId) {
  const m = matches.find(x => x.id===matchId);
  if (!m) return;
  m.status='closed';
  saveCachedMatches(matches);
  toast('Pronósticos cerrados para ese partido','ok');
  renderView('admin');
}

function saveMeta(type) {
  const val = document.getElementById(type==='champion'?'meta-champ':'meta-scorer').value.trim();
  if (!val) { toast('Ingresá el valor','err'); return; }
  const meta = DB.get('meta',{});
  if (type==='champion') meta.champion=val; else meta.topScorer=val;
  DB.set('meta',meta);
  toast('Guardado — se recalculan los puntos especiales ✓','ok');
}

function exportData() {
  const data = {
    players:DB.getPlayers(), matches,
    predictions:DB.getPredictions(), wildcards:DB.getWildcards(),
    special:DB.getSpecial(), meta:DB.get('meta',{})
  };
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download=`mundial2026_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
  toast('Exportado ✓','ok');
}

function importData() {
  const input = document.createElement('input');
  input.type='file'; input.accept='.json';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if (d.players)     DB.savePlayers(d.players);
        if (d.matches)     { matches = d.matches; saveCachedMatches(matches); }
        if (d.predictions) DB.savePredictions(d.predictions);
        if (d.wildcards)   DB.saveWildcards(d.wildcards);
        if (d.special)     DB.saveSpecial(d.special);
        if (d.meta)        DB.set('meta',d.meta);
        toast('Datos importados ✓','ok');
        renderView('admin');
      } catch { toast('Archivo inválido','err'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function adminDeletePlayer(playerId) {
  const players = DB.getPlayers();
  const p = players.find(x => x.id === playerId);
  if (!p) return;
  if (!confirm(`¿Eliminar a ${p.name}? Sus pronósticos también serán borrados.`)) return;
  // Borrar jugador
  DB.savePlayers(players.filter(x => x.id !== playerId));
  // Borrar sus pronósticos
  DB.savePredictions(DB.getPredictions().filter(x => x.playerId !== playerId));
  // Borrar sus wildcards
  const wc = DB.getWildcards();
  delete wc[playerId];
  DB.saveWildcards(wc);
  // Borrar sus especiales
  DB.saveSpecial(DB.getSpecial().filter(x => x.playerId !== playerId));
  toast(`${p.name} eliminado ✓`, 'ok');
  renderView('admin');
}

function adminResetPin(playerId) {
  const players = DB.getPlayers();
  const p = players.find(x => x.id === playerId);
  if (!p) return;
  if (!confirm(`¿Resetear el PIN de ${p.name}?\nLa próxima vez que ingrese podrá elegir un PIN nuevo.`)) return;
  delete p.pinHash;
  DB.savePlayers(players);
  toast(`PIN de ${p.name} reseteado ✓`, 'ok');
  renderView('admin');
}

function clearPlayers() {
  if (!confirm('¿Borrar todos los jugadores y pronósticos?\nLos partidos y resultados de FIFA no se tocan.')) return;
  DB.savePlayers([]);
  DB.savePredictions([]);
  DB.saveWildcards({});
  DB.saveSpecial([]);
  DB.set('meta', {});
  toast('Jugadores y pronósticos borrados ✓', 'ok');
  sessionStorage.removeItem('wc26_cp');
  currentPlayer = null;
  setTimeout(() => {
    document.getElementById('app').style.display = 'none';
    const sel = document.getElementById('player-select');
    sel.style.display = 'flex';
    sel.innerHTML = renderLoginScreen();
  }, 800);
}

function clearAll() {
  DB.savePlayers([]); DB.savePredictions([]); DB.saveWildcards({}); DB.saveSpecial([]); DB.set('meta',{});
  matches = []; localStorage.removeItem(MATCH_CACHE_KEY);
  if (_fbDatabase) _fbDatabase.ref(FB_ROOT + '/fifa_matches').remove().catch(()=>{});
  fifaSource = 'Sin datos';
  toast('Datos borrados','err');
  changePlayer();
}

// ╔══════════════════════════════════════════════════╗
// ║  INIT                                             ║
// ╚══════════════════════════════════════════════════╝
(async function init() {
  // 1. Mostrar pantalla de carga
  const selEl = document.getElementById('player-select');
  selEl.style.display = 'flex';
  selEl.innerHTML = `
    <div style="text-align:center;padding:2rem;">
      <div style="font-size:52px;">⚽</div>
      <div style="font-family:var(--fd,'Barlow Condensed');font-size:28px;font-weight:800;letter-spacing:.06em;margin-top:1rem;color:#ecfdf5;">MUNDIAL 2026</div>
      <div style="font-size:13px;color:#7a9e82;margin-top:.5rem;">Conectando al servidor...</div>
    </div>`;

  // 2. Conectar Firebase
  try {
    await initFirebase();
  } catch(e) {
    selEl.innerHTML = `
      <div style="text-align:center;padding:2rem;max-width:340px;">
        <div style="font-size:40px;">🔌</div>
        <div style="font-size:16px;font-weight:600;margin-top:1rem;color:#f87171;">Sin conexión</div>
        <div style="font-size:13px;color:#7a9e82;margin-top:.5rem;line-height:1.6;">
          No se pudo conectar a Firebase.<br>Verificá tu conexión a internet y recargá la página.
        </div>
        <button onclick="location.reload()" style="margin-top:1.5rem;padding:10px 20px;background:#4ade80;color:#0e1a10;border:none;border-radius:8px;font-weight:700;cursor:pointer;">🔄 Reintentar</button>
      </div>`;
    return;
  }

  // 3. Cargar partidos: primero caché local, luego Firebase, luego FIFA en background
  matches = loadCachedMatches();
  if (!matches.length) {
    // Intentar desde Firebase
    await new Promise(resolve => {
      loadCachedMatchesFromFirebase(fbMatches => {
        if (fbMatches.length) { matches = fbMatches; saveCachedMatches(fbMatches); }
        resolve();
      });
    });
  }
  fifaSource = matches.length ? `Caché · ${matches.length} partidos` : 'Sin datos';

  // 4. Restaurar HTML del player-select
  selEl.innerHTML = renderLoginScreen();

  // 5. Restaurar sesión — primero sessionStorage (pestaña actual), luego localStorage (recordarme)
  let autoLogged = false;
  const savedSession = sessionStorage.getItem('wc26_cp');
  const savedRemember = localStorage.getItem('wc26_remember');

  if (savedSession) {
    try {
      const sp = JSON.parse(savedSession);
      const found = DB.getPlayers().find(x => x.id===sp.id);
      if (found) { currentPlayer=found; showApp(); autoLogged=true; }
    } catch {}
  }
  if (!autoLogged && savedRemember) {
    try {
      const sr = JSON.parse(savedRemember);
      const found = DB.getPlayers().find(x => x.id===sr.id);
      if (found) {
        currentPlayer=found;
        sessionStorage.setItem('wc26_cp', JSON.stringify(found));
        showApp();
        autoLogged=true;
      }
    } catch {}
  }
  if (!autoLogged) renderPlayerSelect();

  // 6. Obtener datos frescos de FIFA en segundo plano
  loadFifaMatches({ silent: true });
})();
</script>
